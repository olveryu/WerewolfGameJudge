<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>入坐动画预览 — 狼人杀扭蛋奖励</title>
    <style>
      :root {
        --bg: #0f1117;
        --card: #1a1d28;
        --border: #2a2d3a;
        --text: #e2e8f0;
        --text-muted: #8892a4;
        --common: #a0aec0;
        --rare: #63b3ed;
        --epic: #b794f4;
        --legendary: #f6e05e;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        padding: 24px;
        line-height: 1.5;
      }
      h1 {
        font-size: 28px;
        margin-bottom: 8px;
      }
      h2 {
        font-size: 20px;
        margin: 32px 0 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      h2 .badge {
        font-size: 12px;
        padding: 2px 10px;
        border-radius: 10px;
        font-weight: 600;
      }
      .badge-common {
        background: var(--common);
        color: #1a202c;
      }
      .badge-rare {
        background: var(--rare);
        color: #1a202c;
      }
      .badge-epic {
        background: var(--epic);
        color: #1a202c;
      }
      .badge-legendary {
        background: var(--legendary);
        color: #1a202c;
      }
      .subtitle {
        color: var(--text-muted);
        font-size: 14px;
        margin-bottom: 24px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }
      .grid.large {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      }
      .tile-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      .tile {
        width: 100px;
        height: 100px;
        border-radius: 18px;
        background: #252836;
        position: relative;
        overflow: hidden;
        cursor: pointer;
        border: 2px solid var(--border);
        transition: border-color 0.2s;
      }
      .tile:hover {
        border-color: #4a5568;
      }
      .tile .avatar {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 2;
        background: url('../assets/avatars/web/wolfKing.webp') center/cover no-repeat;
        border-radius: 18px;
      }
      .tile .avatar span {
        display: none;
      }
      .tile .anim-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 3;
        pointer-events: none;
      }
      .tile-label {
        font-size: 11px;
        color: var(--text-muted);
        text-align: center;
        max-width: 120px;
        word-break: break-all;
      }
      .replay-hint {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 16px;
      }

      /* ========= COMMON KEYFRAMES ========= */
      @keyframes anim-fade {
        0% {
          opacity: 0;
          transform: scale(0.85);
        }
        60% {
          opacity: 1;
          transform: scale(1.02);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes anim-slideUp {
        0% {
          opacity: 0;
          transform: translateY(40px);
        }
        70% {
          opacity: 1;
          transform: translateY(-4px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes anim-slideDown {
        0% {
          opacity: 0;
          transform: translateY(-40px);
        }
        70% {
          opacity: 1;
          transform: translateY(4px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes anim-zoomIn {
        0% {
          opacity: 0;
          transform: scale(0.1);
        }
        60% {
          opacity: 1;
          transform: scale(1.08);
        }
        80% {
          transform: scale(0.96);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes anim-zoomOut {
        0% {
          opacity: 0;
          transform: scale(2.5);
        }
        50% {
          opacity: 0.8;
          transform: scale(0.92);
        }
        80% {
          opacity: 1;
          transform: scale(1.04);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes anim-spin {
        0% {
          opacity: 0;
          transform: rotate(-360deg) scale(0.5);
        }
        60% {
          opacity: 1;
          transform: rotate(15deg) scale(1.05);
        }
        80% {
          transform: rotate(-5deg) scale(0.98);
        }
        100% {
          opacity: 1;
          transform: rotate(0deg) scale(1);
        }
      }
      @keyframes anim-bounce {
        0% {
          opacity: 0;
          transform: translateY(60px) scale(0.8);
        }
        30% {
          opacity: 1;
          transform: translateY(-15px) scale(1.05);
        }
        50% {
          transform: translateY(8px) scale(0.97);
        }
        70% {
          transform: translateY(-4px) scale(1.02);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes anim-flip {
        0% {
          opacity: 0;
          transform: perspective(400px) rotateY(90deg);
        }
        50% {
          opacity: 0.8;
          transform: perspective(400px) rotateY(-10deg);
        }
        80% {
          opacity: 1;
          transform: perspective(400px) rotateY(3deg);
        }
        100% {
          opacity: 1;
          transform: perspective(400px) rotateY(0deg);
        }
      }
      @keyframes anim-blur {
        0% {
          opacity: 0;
          transform: scale(1.3);
          filter: blur(12px);
        }
        60% {
          opacity: 0.8;
          transform: scale(1.02);
          filter: blur(3px);
        }
        100% {
          opacity: 1;
          transform: scale(1);
          filter: blur(0px);
        }
      }
      @keyframes anim-pop {
        0% {
          opacity: 0;
          transform: scale(0);
        }
        50% {
          opacity: 1;
          transform: scale(1.25);
        }
        70% {
          transform: scale(0.9);
        }
        85% {
          transform: scale(1.08);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* ========= RARE KEYFRAMES ========= */
      @keyframes anim-spiral-avatar {
        0% {
          opacity: 0;
          transform: scale(0.3) rotate(-180deg);
        }
        60% {
          opacity: 0.5;
          transform: scale(0.8) rotate(-30deg);
        }
        85% {
          opacity: 1;
          transform: scale(1.05) rotate(5deg);
        }
        100% {
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }
      }
      @keyframes spiral-orbit {
        0% {
          transform: rotate(0deg) translateX(40px) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: rotate(720deg) translateX(0px) rotate(-720deg);
          opacity: 0;
        }
      }
      @keyframes shatter-tl {

        }
        10% {

        }
        70% {

          opacity: 1;
        }
        100% {

        }
      }
      @keyframes shatter-tr {

        }
        70% {

          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
      @keyframes shatter-bl {

        }
        10% {

        }
        70% {

        }

      @keyframes shatter-br {

        }

        }
        100% {

      }
      @keyframes shatter-t {

        }
        10% {

        }
        70% {
          transform: translateY(0);
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
      @keyframes shatter-b {
        0% {
          transform: translateY(50px);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        70% {
          transform: translateY(0);
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
      @keyframes shatter-l {
        0% {
          transform: translateX(-50px);
          opacity: 0;
        }
        10% {

        }
        70% {

        }
        100% {

      @keyframes shatter-r {

        }
        10% {
          opacity: 1;
        }
        70% {
          transform: translateX(0);
          opacity: 1;
        }
        100% {

        }
      }
      @keyframes anim-shatter-avatar {
        0% {
          opacity: 0;
          transform: scale(0.5);
        }
        70% {
          opacity: 0;
          transform: scale(0.5);
        }
        85% {
          opacity: 1;
          transform: scale(1.06);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes portal-ring {
        0% {
          r: 5;
          opacity: 0;
          stroke-width: 3;
        }
        20% {
          opacity: 1;
        }
        70% {
          r: 45;
          opacity: 0.6;
          stroke-width: 1;
        }
        100% {
          r: 55;
          opacity: 0;
          stroke-width: 0.5;
        }
      }
      @keyframes anim-portal-avatar {
        0% {
          opacity: 0;
          transform: scale(0);
        }
        60% {
          opacity: 0;
          transform: scale(0);
        }
        80% {
          opacity: 1;
          transform: scale(1.1);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes lightning-flash {
        0% {
          opacity: 0;
        }
        15% {
          opacity: 1;
        }
        25% {
          opacity: 0;
        }
        35% {
          opacity: 1;
        }
        45% {
          opacity: 0.3;
        }
        50% {
          opacity: 1;
        }
        70% {
          opacity: 0;
        }
        100% {
          opacity: 0;
        }
      }
      @keyframes anim-lightning-avatar {
        0% {
          opacity: 0;
          transform: scale(0.8);
          filter: brightness(3);
        }
        50% {
          opacity: 0;
          transform: scale(0.8);
          filter: brightness(3);
        }
        65% {
          opacity: 1;
          transform: scale(1.1);
          filter: brightness(2);
        }
        80% {
          transform: scale(0.98);
          filter: brightness(1.2);
        }
        100% {
          opacity: 1;
          transform: scale(1);
          filter: brightness(1);
        }
      }
      @keyframes bloom-petal {
        0% {
          opacity: 0;
          transform: rotate(var(--rot)) translateY(0) scale(0.3);
        }
        30% {
          opacity: 1;
          transform: rotate(var(--rot)) translateY(-10px) scale(1);
        }
        70% {
          opacity: 0.8;
          transform: rotate(var(--rot)) translateY(-30px) scale(0.8);
        }
        100% {
          opacity: 0;
          transform: rotate(var(--rot)) translateY(-45px) scale(0.3);
        }
      }
      @keyframes anim-bloom-avatar {
        0% {
          opacity: 0;
          transform: scale(0.6);
        }
        55% {
          opacity: 0;
          transform: scale(0.6);
        }
        75% {
          opacity: 1;
          transform: scale(1.08);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* ========= EPIC KEYFRAMES ========= */
      @keyframes wolfClaw1 {
        0% {
          clip-path: polygon(50% 0%, 50% 0%, 50% 100%, 50% 100%);
          opacity: 0;
        }
        20% {
          opacity: 1;
        }
        50% {
          clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
        }
        100% {
          clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
          opacity: 0;
        }
      }
      @keyframes wolfClaw-avatar {
        0% {
          opacity: 0;
          clip-path: polygon(50% 0%, 50% 0%, 50% 100%, 50% 100%);
        }
        40% {
          opacity: 0;
          clip-path: polygon(50% 0%, 50% 0%, 50% 100%, 50% 100%);
        }
        70% {
          opacity: 1;
          clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
        }
        100% {
          opacity: 1;
          clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
        }
      }
      @keyframes moonrise {
        0% {
          transform: translateY(80px) scale(0.3);
          opacity: 0;
        }
        40% {
          transform: translateY(10px) scale(1.1);
          opacity: 1;
        }
        60% {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translateY(-10px) scale(1.2);
        }
      }
      @keyframes moonrise-avatar {
        0% {
          opacity: 0;
          filter: brightness(0.2);
        }
        50% {
          opacity: 0;
          filter: brightness(0.2);
        }
        70% {
          opacity: 1;
          filter: brightness(1.5);
        }
        100% {
          opacity: 1;
          filter: brightness(1);
        }
      }
      @keyframes bloodMist {
        0% {
          opacity: 0;
          filter: blur(15px);
          transform: scale(2);
        }
        30% {
          opacity: 0.6;
          filter: blur(8px);
          transform: scale(1.3);
        }
        70% {
          opacity: 0.8;
          filter: blur(2px);
          transform: scale(1);
        }
        100% {
          opacity: 0;
          filter: blur(0);
          transform: scale(0.9);
        }
      }
      @keyframes bloodMist-avatar {
        0% {
          opacity: 0;
          filter: blur(8px) saturate(3);
        }
        60% {
          opacity: 0;
          filter: blur(8px) saturate(3);
        }
        80% {
          opacity: 1;
          filter: blur(1px) saturate(1.5);
        }
        100% {
          opacity: 1;
          filter: blur(0) saturate(1);
        }
      }
      @keyframes fireRebirth-flame {
        0% {
          opacity: 0;
          transform: scaleY(0);
        }
        20% {
          opacity: 1;
          transform: scaleY(1.2);
        }
        60% {
          opacity: 1;
          transform: scaleY(1);
        }
        80% {

          transform: scaleY(0.3);
        }
        100% {

          transform: scaleY(0);
        }
      }
      @keyframes fireRebirth-avatar {

        }
        55% {

          filter: brightness(0);

        70% {

        }
        85% {

        }

      @keyframes frostCrystal {

      @keyframes frost-avatar {

  <body>
    <h1>🐺 入坐动画预览</h1>
    <p class="subtitle">点击任意座位重播动画。每种类型展示代表性示例。</p>

    <h2>Common 基础动画 <span class="badge badge-common">×100 = 10模板×10色</span></h2>
    <p class="replay-hint">每个模板展示一种颜色，实际每个模板有 10 色变体。最低时长 2.0s。</p>
    <div class="grid" id="common-grid"></div>

    <h2>Rare 进阶动画 <span class="badge badge-rare">×50 = 5模板×10色</span></h2>
    <p class="replay-hint">SVG 粒子/特效层 + 头像入场。最低时长 2.5s。</p>
    <div class="grid large" id="rare-grid"></div>

    <h2>Epic 史诗动画 <span class="badge badge-epic">×40 手工设计</span></h2>
    <p class="replay-hint">狼人杀主题，每个独特视觉叙事。最低时长 3.0s。展示 10 个代表作。</p>
    <div class="grid large" id="epic-grid"></div>

    <h2>Legendary 传说动画 <span class="badge badge-legendary">×10 最高制作</span></h2>
    <p class="replay-hint">多阶段组合动效，4s+ 节奏感叙事。全部 10 个。</p>
    <div class="grid large" id="legendary-grid"></div>

    <div class="controls">
      <button onclick="replayAll()">🔄 全部重播</button>
    </div>

    <script>
      const AVATAR = '';

      // ======== COMMON ========
      const COMMON_TEMPLATES = [
        { name: 'fade', color: '#e53e3e', label: 'fadeRedEnter', dur: '2s', ease: 'ease-out' },
        {
          name: 'slideUp',
          color: '#dd6b20',
          label: 'slideUpOrangeEnter',
          dur: '2s',
          ease: 'cubic-bezier(0.34,1.56,0.64,1)',
        },
        {
          name: 'slideDown',
          color: '#d69e2e',
          label: 'slideDownAmberEnter',
          dur: '2s',
          ease: 'cubic-bezier(0.34,1.56,0.64,1)',
        },
        {
          name: 'zoomIn',
          color: '#38a169',
          label: 'zoomInGreenEnter',
          dur: '2s',
          ease: 'cubic-bezier(0.34,1.56,0.64,1)',
        },
        {
          name: 'zoomOut',
          color: '#319795',
          label: 'zoomOutTealEnter',
          dur: '2.2s',
          ease: 'ease-out',
        },
        {
          name: 'spin',
          color: '#3182ce',
          label: 'spinBlueEnter',
          dur: '2.2s',
          ease: 'cubic-bezier(0.34,1.56,0.64,1)',
        },
        {
          name: 'bounce',
          color: '#5a67d8',
          label: 'bounceIndigoEnter',
          dur: '2s',
          ease: 'cubic-bezier(0.34,1.56,0.64,1)',
        },
        { name: 'flip', color: '#805ad5', label: 'flipPurpleEnter', dur: '2s', ease: 'ease-out' },
        { name: 'blur', color: '#d53f8c', label: 'blurPinkEnter', dur: '2.2s', ease: 'ease-out' },
        {
          name: 'pop',
          color: '#718096',
          label: 'popGrayEnter',
          dur: '2s',
          ease: 'cubic-bezier(0.34,1.56,0.64,1)',
        },
      ];

      function createCommonTile(t) {
        const wrapper = document.createElement('div');
        wrapper.className = 'tile-wrapper';
        wrapper.innerHTML = `
    <div class="tile" data-type="common" data-anim="${t.name}" data-dur="${t.dur}" data-ease="${t.ease}" data-color="${t.color}">
      <div class="avatar" style="animation: anim-${t.name} ${t.dur} ${t.ease} forwards;">${AVATAR}</div>
    </div>
    <div class="tile-label" style="color:${t.color}">${t.label}</div>
  `;
        return wrapper;
      }

      // ======== RARE ========
      const RARE_TEMPLATES = [
        { name: 'spiral', color: '#e53e3e', light: '#feb2b2', label: 'spiralRedEnter' },
        { name: 'shatter', color: '#3182ce', light: '#90cdf4', label: 'shatterBlueEnter' },
        { name: 'portal', color: '#805ad5', light: '#d6bcfa', label: 'portalPurpleEnter' },
        { name: 'lightning', color: '#d69e2e', light: '#faf089', label: 'lightningAmberEnter' },
        { name: 'bloom', color: '#d53f8c', light: '#fbb6ce', label: 'bloomPinkEnter' },
      ];

      function createSpiralSvg(c, light) {
        const particles = [];
        for (let i = 0; i < 12; i++) {
          const delay = (i / 12) * 2;
          particles.push(`<circle cx="50" cy="50" r="3" fill="${i % 2 === 0 ? c : light}"
      style="transform-origin:50px 50px; animation: spiral-orbit 2.5s ease-in ${delay}s forwards; opacity:0;" />`);
        }
        return `<svg viewBox="0 0 100 100" style="width:100%;height:100%">${particles.join('')}</svg>`;
      }

      function createShatterSvg(c, light) {
        // 8 pieces converging from 8 directions to center area
        const pieces = [
          { x: 25, y: 25, anim: 'shatter-tl', delay: 0 },
          { x: 60, y: 25, anim: 'shatter-tr', delay: 0.06 },
          { x: 25, y: 60, anim: 'shatter-bl', delay: 0.12 },
          { x: 60, y: 60, anim: 'shatter-br', delay: 0.18 },
          { x: 42, y: 20, anim: 'shatter-t', delay: 0.08 },
          { x: 42, y: 65, anim: 'shatter-b', delay: 0.14 },
          { x: 18, y: 42, anim: 'shatter-l', delay: 0.1 },
          { x: 65, y: 42, anim: 'shatter-r', delay: 0.16 },
        ];
        return `<svg viewBox="0 0 100 100" style="width:100%;height:100%;overflow:visible">
    ${pieces
      .map(
        (p, i) => `<rect x="${p.x}" y="${p.y}" width="15" height="15" rx="3"
      fill="${i % 2 === 0 ? c : light}" opacity="0"
      style="transform-origin:${p.x + 7.5}px ${p.y + 7.5}px;animation: ${p.anim} 2.5s ease-out ${p.delay}s forwards;" />`,
      )
      .join('')}
  </svg>`;
      }

      function createPortalSvg(c, light) {
        const rings = [];
        for (let i = 0; i < 4; i++) {
          const delay = i * 0.3;
          rings.push(`<circle cx="50" cy="50" r="5" fill="none" stroke="${i % 2 === 0 ? c : light}" stroke-width="2"
      style="animation: portal-ring 2.5s ease-out ${delay}s forwards; opacity:0;" />`);
        }
        return `<svg viewBox="0 0 100 100" style="width:100%;height:100%">${rings.join('')}</svg>`;
      }

      function createLightningSvg(c, light) {
        return `<svg viewBox="0 0 100 100" style="width:100%;height:100%">
    <path d="M55 5 L40 42 L55 42 L38 95 L65 50 L48 50 Z" fill="${c}"
      style="animation: lightning-flash 2.5s ease-out forwards;" />
    <path d="M58 10 L45 40 L57 40 L42 88 L63 48 L50 48 Z" fill="${light}" opacity="0.5"
      style="animation: lightning-flash 2.5s ease-out 0.1s forwards;" />
    <rect x="0" y="0" width="100" height="100" fill="${light}" opacity="0"
      style="animation: lHunterFlash 2.5s ease-out 0.3s forwards;" />
  </svg>`;
      }

      function createBloomSvg(c, light) {
        const petals = [];
        for (let i = 0; i < 8; i++) {
          const rot = (i / 8) * 360;
          const delay = i * 0.1;
          petals.push(`<ellipse cx="50" cy="50" rx="6" ry="15" fill="${i % 2 === 0 ? c : light}" opacity="0"
      style="--rot:${rot}deg; transform-origin:50px 50px; animation: bloom-petal 2.5s ease-out ${delay}s forwards;" />`);
        }
        return `<svg viewBox="0 0 100 100" style="width:100%;height:100%">${petals.join('')}</svg>`;
      }

      const RARE_SVG_CREATORS = {
        spiral: createSpiralSvg,
        shatter: createShatterSvg,
        portal: createPortalSvg,
        lightning: createLightningSvg,
        bloom: createBloomSvg,
      };

      function createRareTile(t) {
        const wrapper = document.createElement('div');
        wrapper.className = 'tile-wrapper';
        const avatarAnim = {
          spiral: 'anim-spiral-avatar',
          shatter: 'anim-shatter-avatar',
          portal: 'anim-portal-avatar',
          lightning: 'anim-lightning-avatar',
          bloom: 'anim-bloom-avatar',
        }[t.name];
        wrapper.innerHTML = `
    <div class="tile" data-type="rare" data-anim="${t.name}" data-color="${t.color}" data-light="${t.light}">
      <div class="anim-layer">${RARE_SVG_CREATORS[t.name](t.color, t.light)}</div>
      <div class="avatar" style="animation: ${avatarAnim} 2.5s ease-out forwards;">${AVATAR}</div>
    </div>
    <div class="tile-label" style="color:${t.color}">${t.label}</div>
  `;
        return wrapper;
      }

      // ======== EPIC ========
      const EPIC_SAMPLES = [
        {
          id: 'wolfClawEnter',
          label: '狼爪撕裂',
          avatarAnim: 'wolfClaw-avatar',
          dur: '3s',
          overlay: (s) => `<div style="position:absolute;inset:0;z-index:3;pointer-events:none;">
      <div style="position:absolute;inset:0;background:linear-gradient(135deg,#1a1a2e,#16213e);
        animation: wolfClaw1 ${s} ease-out forwards;">
        <svg viewBox="0 0 100 100" style="width:100%;height:100%">
          <path d="M20 0 L25 40 L15 45 L30 100" stroke="#e53e3e" stroke-width="3" fill="none" opacity="0.8"/>
          <path d="M45 0 L50 35 L40 40 L55 100" stroke="#e53e3e" stroke-width="3" fill="none" opacity="0.8"/>
          <path d="M70 0 L75 38 L65 42 L80 100" stroke="#e53e3e" stroke-width="3" fill="none" opacity="0.8"/>
        </svg>
      </div>
    </div>`,
        },
        {
          id: 'moonriseEnter',
          label: '满月升起',

      // ======== REPLAY LOGIC ========

      });

      function replayTile(tile) {
        const clone = tile.cloneNode(true);
        clone.addEventListener('click', () => replayTile(clone));
        tile.parentNode.replaceChild(clone, tile);
      }

        document.querySelectorAll('.tile').forEach((tile) => replayTile(tile));
