name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest
    outputs:
      edge_changed: ${{ steps.detect-edge.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect edge function / game-engine changes
        id: detect-edge
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'supabase/functions/**/*.ts' 'packages/game-engine/src/**')
            if [[ -n "$CHANGED" ]]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "Edge-related files changed:"
              echo "$CHANGED"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format

      - name: Test
        run: pnpm run test:all

      - name: Build game-engine ESM (needed by Deno tests)
        run: pnpm --filter @werewolf/game-engine run build:esm

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.7.7

      - name: Deno Edge Function tests
        run: deno test --no-check --allow-env --allow-net --allow-read supabase/functions/

  deploy-edge-functions:
    runs-on: ubuntu-latest
    if: |
      needs.quality.result == 'success' &&
      (
        ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main') ||
        (github.event_name == 'pull_request' && needs.quality.outputs.edge_changed == 'true')
      )
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build game-engine ESM
        run: pnpm --filter @werewolf/game-engine run build:esm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy game --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy gemini-proxy --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

  e2e:
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.quality.result == 'success'
    needs: [quality]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # ── Local Supabase ──────────────────────────────────
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start

      - name: Create E2E local config
        run: |
          ANON_KEY=$(supabase status -o env | grep ANON_KEY | cut -d= -f2)
          cat > env/e2e.local.json << EOF
          {
            "EXPO_PUBLIC_SUPABASE_URL": "http://127.0.0.1:54321",
            "EXPO_PUBLIC_SUPABASE_ANON_KEY": "$ANON_KEY"
          }
          EOF

      - name: Build game-engine ESM (for Edge Functions serve)
        run: pnpm --filter @werewolf/game-engine run build:esm

      # ── Playwright ──────────────────────────────────────
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }}/4)
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/4 --reporter=list --reporter=blob
        env:
          E2E_ENV: local

      - name: Upload blob report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    runs-on: ubuntu-latest
    if: always() && needs.e2e.result != 'skipped'
    needs: e2e
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge reports
        run: pnpm exec playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload merged report
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload report to Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: playwright-report/

  deploy-report:
    runs-on: ubuntu-latest
    if: always() && needs.merge-reports.result == 'success' && github.ref == 'refs/heads/main'
    needs: merge-reports
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add report link to summary
        run: |
          echo "## 📊 Playwright Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "👉 [${{ steps.deployment.outputs.page_url }}](${{ steps.deployment.outputs.page_url }})" >> $GITHUB_STEP_SUMMARY

  restore-edge-functions:
    runs-on: ubuntu-latest
    if: |
      always() &&
      github.event_name == 'pull_request' &&
      needs.quality.outputs.edge_changed == 'true' &&
      needs.deploy-edge-functions.result == 'success'
    needs: [quality, deploy-edge-functions, e2e]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build game-engine ESM (main branch)
        run: pnpm --filter @werewolf/game-engine run build:esm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Restore production Edge Functions
        run: |
          supabase functions deploy game --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy gemini-proxy --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Post restore status
        if: always()
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: edge-restore-status
          message: |
            ${{ job.status == 'success' && '✅' || '❌' }} **Edge Functions restore**: ${{ job.status }}

            Production edge functions have been ${{ job.status == 'success' && 'restored to `main` branch version.' || '**NOT restored**. Please run `pnpm run deploy` manually or trigger `workflow_dispatch` on main.' }}
