name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  deployments: write
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format

      - name: Test
        run: pnpm run test:all

  deploy-api-worker:
    runs-on: ubuntu-latest
    if: |
      needs.quality.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build game-engine (api-worker dependency)
        run: pnpm --filter @werewolf/game-engine run build

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/api-worker
          packageManager: pnpm
          command: d1 migrations apply werewolf-db --remote

      - name: Deploy API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/api-worker
          packageManager: pnpm
          command: deploy

  deploy-frontend:
    runs-on: ubuntu-latest
    if: |
      needs.quality.result == 'success' &&
      github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    permissions:
      contents: read
      deployments: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # OIDC trusted publishing requires npm >= 11.5.1 (Node 22 ships npm 10.x)
      - run: npm install -g npm@11

      - name: Build
        run: bash scripts/build.sh
        env:
          CF_PAGES_BRANCH: main
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      # Rewrite asset URLs BEFORE npm publish so CDN-hosted JS files
      # contain absolute CDN URLs for dynamic chunks (App.js, etc.)
      - name: Rewrite asset URLs to use CDN
        id: cdn
        run: |
          PKG_VERSION="0.0.0-g${GITHUB_SHA::8}"
          CDN_BASE="https://cdn.npmmirror.com/packages/werewolf-judge-cdn/${PKG_VERSION}/files"

          # JS bundles: rewrite "/assets/ string literals to CDN (Metro chunk references)
          for jsfile in dist/assets/js/*.js; do
            sed -i "s|\"/assets/|\"${CDN_BASE}/assets/|g" "$jsfile"
            # Replace WASM placeholder with versioned CDN URL for pre-compressed canvaskit
            sed -i "s|__CANVASKIT_WASM_GZ_URL__|${CDN_BASE}/wasm/canvaskit.wasm.gz|g" "$jsfile"
          done

          # HTML: rewrite src="/assets/... and href="/assets/... to CDN
          sed -i "s|src=\"/assets/|src=\"${CDN_BASE}/assets/|g" dist/index.html
          sed -i "s|href=\"/assets/|href=\"${CDN_BASE}/assets/|g" dist/index.html

          echo "cdn_base=$CDN_BASE" >> "$GITHUB_OUTPUT"
          echo "✅ All asset URLs rewritten to ${CDN_BASE}"

      # Publish REWRITTEN assets to npm → npmmirror CDN (OIDC trusted publishing, no token needed)
      - name: Publish assets to npm
        id: npm
        run: |
          PKG_VERSION="0.0.0-g${GITHUB_SHA::8}"
          WORK=$(mktemp -d)

          # Copy already-rewritten assets/ tree (JS bundles have CDN URLs baked in)
          cp -r dist/assets "$WORK/assets"

          # Pre-compress CanvasKit WASM for CDN delivery (8 MB → ~3.2 MB gzip).
          # Client fetches .wasm.gz and decompresses via DecompressionStream.
          # cp first: pnpm hardlinks node_modules files, gzip -k refuses multi-link targets.
          mkdir -p "$WORK/wasm"
          cp node_modules/canvaskit-wasm/bin/full/canvaskit.wasm "$WORK/wasm/canvaskit.wasm"
          gzip -9 "$WORK/wasm/canvaskit.wasm"

          # Generate index.js — importable manifest of all bundled assets
          FILES=$(cd "$WORK" && find assets wasm -type f | sort)
          {
            echo '"use strict";'
            echo "const VERSION = \"$PKG_VERSION\";"
            echo "const ASSETS = ["
            for f in $FILES; do
              echo "  \"$f\","
            done
            echo "];"
            echo "module.exports = { version: VERSION, assets: ASSETS };"
          } > "$WORK/index.js"

          cat > "$WORK/README.md" << 'EOF'
          # werewolf-judge-cdn

          Runtime asset loader and manifest for the [WerewolfJudge](https://github.com/olveryu/WerewolfGameJudge) web app.

          Provides a versioned manifest of all bundled assets (fonts, audio sprites, image bundles)
          so that Service Workers, deployment scripts, and build tools can enumerate and pre-cache them.

          ## Installation

          ```bash
          npm install werewolf-judge-cdn
          ```

          ## Usage

          ```js
          const { version, assets } = require('werewolf-judge-cdn');
          // version — semver string tied to the build commit
          // assets  — array of relative asset paths for cache pre-warming
          ```

          ## License

          MIT
          EOF
          # Trim leading spaces from heredoc (YAML indent)
          sed -i 's/^          //' "$WORK/README.md"

          printf '{"name":"werewolf-judge-cdn","version":"%s","description":"Runtime asset loader and manifest for the WerewolfJudge web app — fonts, audio sprites, and image bundles","license":"MIT","keywords":["werewolf","assets","manifest","loader"],"main":"index.js","files":["index.js","assets/","wasm/","README.md"],"repository":{"type":"git","url":"https://github.com/olveryu/WerewolfGameJudge.git"}}' "$PKG_VERSION" > "$WORK/package.json"
          cd "$WORK"
          # Idempotent publish: skip if this version already exists on npm
          # (happens when a reverted commit re-lands with the same SHA)
          if npm view "werewolf-judge-cdn@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "⏭️ werewolf-judge-cdn@$PKG_VERSION already published — skipping"
          else
            npm publish --access public --tag latest
            echo "✅ Published werewolf-judge-cdn@$PKG_VERSION"
            # Wait for npm registry to propagate (eventual consistency)
            echo "⏳ Waiting 10s for npm registry propagation..."
            sleep 10
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync npmmirror and verify CDN
        run: |
          PKG_VERSION="${{ steps.npm.outputs.version }}"
          CDN_BASE="https://cdn.npmmirror.com/packages/werewolf-judge-cdn/${PKG_VERSION}/files"

          # Trigger sync and capture task ID
          SYNC_RESP=$(curl -sX PUT "https://registry-direct.npmmirror.com/-/package/werewolf-judge-cdn/syncs")
          SYNC_ID=$(echo "$SYNC_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Sync triggered: $SYNC_ID"

          # Poll sync task status until success (up to 180s)
          SYNC_OK=false
          for i in $(seq 1 36); do
            STATE=$(curl -s "https://registry-direct.npmmirror.com/-/package/werewolf-judge-cdn/syncs/$SYNC_ID" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('state','unknown'))")
            if [ "$STATE" = "success" ]; then
              echo "✅ npmmirror sync task complete"
              SYNC_OK=true
              break
            elif [ "$STATE" = "fail" ]; then
              echo "❌ npmmirror sync task failed"
              break
            fi
            echo "⏳ Sync state: $STATE ($((i*5))s)"
            sleep 5
          done

          if [ "$SYNC_OK" != "true" ]; then
            echo "❌ npmmirror sync did not succeed — aborting deploy"
            exit 1
          fi

          # Verify the version actually exists on npmmirror registry
          VERSION_CHECK=$(curl -s "https://registry.npmmirror.com/werewolf-judge-cdn/${PKG_VERSION}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('version',''))")
          if [ "$VERSION_CHECK" != "$PKG_VERSION" ]; then
            echo "❌ Version $PKG_VERSION not found on npmmirror registry after sync (got: '$VERSION_CHECK')"
            echo "   npm registry propagation was too slow — re-triggering sync..."
            # Retry: trigger a second sync and wait
            SYNC_RESP2=$(curl -sX PUT "https://registry-direct.npmmirror.com/-/package/werewolf-judge-cdn/syncs")
            SYNC_ID2=$(echo "$SYNC_RESP2" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
            for j in $(seq 1 24); do
              STATE2=$(curl -s "https://registry-direct.npmmirror.com/-/package/werewolf-judge-cdn/syncs/$SYNC_ID2" \
                | python3 -c "import sys,json; print(json.load(sys.stdin).get('state','unknown'))")
              if [ "$STATE2" = "success" ]; then break; fi
              sleep 5
            done
            # Final check
            VERSION_CHECK2=$(curl -s "https://registry.npmmirror.com/werewolf-judge-cdn/${PKG_VERSION}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('version',''))")
            if [ "$VERSION_CHECK2" != "$PKG_VERSION" ]; then
              echo "❌ Version still missing after retry — aborting deploy"
              exit 1
            fi
          fi
          echo "✅ Version $PKG_VERSION confirmed on npmmirror registry"

          # Verify CDN file is actually accessible (the real test)
          CDN_URL="${CDN_BASE}/index.js"
          for k in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$CDN_URL")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ CDN file verified: $CDN_URL → 200"
              exit 0
            fi
            echo "⏳ CDN file check: $CDN_URL → $HTTP_CODE ($((k*5))s)"
            sleep 5
          done
          echo "❌ CDN file still not accessible after 60s — aborting deploy"
          echo "   URL: $CDN_URL"
          exit 1

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: pages deploy dist --project-name=werewolfgamejudge
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-miniapp:
    runs-on: ubuntu-latest
    if: |
      needs.quality.result == 'success' &&
      github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check miniapp changes
        id: changes
        run: |
          # Upload on release commits OR miniapp/ file changes
          COMMIT_MSG=$(git log -1 --pretty=%s)
          if echo "$COMMIT_MSG" | grep -q '^release:'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD~1 HEAD -- miniapp/ | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version-file: '.nvmrc'

      - name: Upload to WeChat Mini Program
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "${{ secrets.MINIAPP_UPLOAD_KEY }}" > /tmp/miniapp-key.pem
          VERSION=$(node -p "require('./package.json').version")
          npx miniprogram-ci upload \
            --pp miniapp \
            --pkp /tmp/miniapp-key.pem \
            --appid wx7f0c3bea5873908c \
            --uv "$VERSION" \
            --desc "CI deploy: $(git log -1 --pretty=%s)" \
            -r 1
          rm -f /tmp/miniapp-key.pem

  e2e:
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.quality.result == 'success'
    needs: [quality]
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Balanced by measured runtime (target ~13min each) ──
          - shard: 1
            specs: 'night-roles-check.spec.ts'
          - shard: 2
            specs: 'reconnect.spec.ts night-roles-block.spec.ts'
          - shard: 3
            specs: 'night-roles-kill.spec.ts night-roles-protect.spec.ts night-roles-piper.spec.ts night-roles-gargoyle.spec.ts'
          - shard: 4
            specs: 'entry-flow.spec.ts db-recovery.spec.ts seating.spec.ts night-roles-eclipse-wolf-queen.spec.ts night-roles-thief-cupid.spec.ts night-roles-treasure.spec.ts night-verify.spec.ts night-2p.spec.ts night-6p.spec.ts offline-recovery-canary.spec.ts rejoin.spec.ts restart.spec.ts room-lifecycle.spec.ts home.spec.ts config.spec.ts'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # ── Playwright ──────────────────────────────────────
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }}/4)
        run: pnpm exec playwright test ${{ matrix.specs }} --reporter=list --reporter=blob

      - name: Upload blob report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    runs-on: ubuntu-latest
    if: always() && needs.e2e.result != 'skipped'
    needs: e2e
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge reports
        run: pnpm exec playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload merged report
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Deploy report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: playwright-report
          target-folder: run/${{ github.run_number }}
          clean: false

      - name: Update index and prune old reports
        if: github.ref == 'refs/heads/main'
        run: |
          git fetch origin gh-pages
          git worktree add gh-pages-branch origin/gh-pages
          cd gh-pages-branch

          # Prune old reports — keep only the 20 most recent
          MAX_REPORTS=20
          if [ -d run ]; then
            RUNS=$(ls -1d run/*/ 2>/dev/null | sed 's|run/||;s|/||' | sort -n)
            COUNT=$(echo "$RUNS" | wc -l | tr -d ' ')
            if [ "$COUNT" -gt "$MAX_REPORTS" ]; then
              REMOVE_COUNT=$((COUNT - MAX_REPORTS))
              echo "$RUNS" | head -n "$REMOVE_COUNT" | while read -r old; do
                echo "Removing old report: run/$old"
                git rm -rf "run/$old"
              done
            fi
          fi

          # Generate index.html listing all remaining reports
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Playwright Reports</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #24292f; }
              h1 { border-bottom: 1px solid #d0d7de; padding-bottom: 8px; }
              table { width: 100%; border-collapse: collapse; }
              th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #d0d7de; }
              th { background: #f6f8fa; }
              a { color: #0969da; text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>Playwright Reports</h1>
            <table>
              <thead><tr><th>Run</th><th>Link</th></tr></thead>
              <tbody>
          EOF
          sed -i 's/^          //' index.html

          if [ -d run ]; then
            ls -1d run/*/ 2>/dev/null | sed 's|run/||;s|/||' | sort -rn | while read -r r; do
              echo "    <tr><td>#${r}</td><td><a href=\"run/${r}/\">View Report</a></td></tr>" >> index.html
            done
          fi

          cat >> index.html << 'EOF'
              </tbody>
            </table>
          </body>
          </html>
          EOF
          sed -i 's/^          //' index.html

          git add -A
          if git diff --cached --quiet; then
            echo "No index changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: update report index (run #${{ github.run_number }})"
            git push origin HEAD:gh-pages
          fi

          cd "$GITHUB_WORKSPACE"
          git worktree remove gh-pages-branch

      - name: Add report link to summary
        if: github.ref == 'refs/heads/main'
        run: |
          OWNER=$(echo "${{ github.repository }}" | cut -d/ -f1)
          REPO=$(echo "${{ github.repository }}" | cut -d/ -f2)
          PAGES_URL="https://${OWNER}.github.io/${REPO}"
          REPORT_URL="${PAGES_URL}/run/${{ github.run_number }}/"
          echo "## 📊 Playwright Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "👉 [Run #${{ github.run_number }} Report](${REPORT_URL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 [All Reports](${PAGES_URL})" >> $GITHUB_STEP_SUMMARY
