name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest
    outputs:
      edge_changed: ${{ steps.detect-edge.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect edge function / game-engine changes
        id: detect-edge
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- supabase/functions/ packages/game-engine/)
            if [[ -n "$CHANGED" ]]; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "Edge-related files changed:"
              echo "$CHANGED"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format

      - name: Test
        run: pnpm run test:all

      - name: Build game-engine ESM (needed by Deno tests)
        run: pnpm --filter @werewolf/game-engine run build:esm

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno Edge Function tests
        run: deno test --no-check --allow-env --allow-net --allow-read supabase/functions/

  deploy-edge-functions:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build game-engine ESM
        run: pnpm --filter @werewolf/game-engine run build:esm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy game --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy gemini-proxy --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

  e2e:
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.quality.result == 'success' &&
      (needs.deploy-edge-functions.result == 'success' || needs.deploy-edge-functions.result == 'skipped') &&
      !(github.event_name == 'pull_request' && needs.quality.outputs.edge_changed == 'true')
    needs: [quality, deploy-edge-functions]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Create E2E remote config
        run: cp env/e2e.remote.example.json env/e2e.remote.json

      - name: Run E2E tests (shard ${{ matrix.shard }}/6)
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/6 --reporter=list --reporter=blob
        env:
          E2E_ENV: remote
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    runs-on: ubuntu-latest
    if: always() && needs.e2e.result != 'skipped'
    needs: e2e
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge reports
        run: pnpm exec playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload report to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

  deploy-report:
    runs-on: ubuntu-latest
    if: always() && needs.merge-reports.result == 'success'
    needs: merge-reports
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add report link to summary
        run: |
          echo "## 📊 Playwright Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "👉 [${{ steps.deployment.outputs.page_url }}](${{ steps.deployment.outputs.page_url }})" >> $GITHUB_STEP_SUMMARY

  warn-edge-changed:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && needs.quality.outputs.edge_changed == 'true'
    needs: quality
    steps:
      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: edge-changed-warning
          message: |
            ⚠️ **E2E tests skipped** — this PR modifies `supabase/functions/` or `packages/game-engine/`.

            Edge Functions are only deployed on merge to `main`. E2E will run automatically after merge.
            To verify locally, use `pnpm exec playwright test --reporter=list` against a local Supabase instance.
