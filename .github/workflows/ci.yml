name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pages: write
  id-token: write
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm run format

      - name: Test
        run: pnpm run test:all

  deploy-api-worker:
    runs-on: ubuntu-latest
    if: |
      needs.quality.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build game-engine (api-worker dependency)
        run: pnpm --filter @werewolf/game-engine run build

      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/api-worker
          packageManager: pnpm
          command: d1 migrations apply werewolf-db --remote

      - name: Deploy API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/api-worker
          packageManager: pnpm
          command: deploy

  deploy-frontend:
    runs-on: ubuntu-latest
    if: |
      needs.quality.result == 'success' &&
      github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: bash scripts/build.sh
        env:
          CF_PAGES_BRANCH: main
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      # Publish JS bundles to npm → npmmirror CDN serves to China users
      - name: Publish JS bundles to npm
        id: npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PKG_VERSION="0.0.0-${GITHUB_SHA::8}"
          WORK=$(mktemp -d)
          mkdir -p "$WORK/assets/js"
          cp dist/assets/js/* "$WORK/assets/js/"
          printf '{"name":"werewolf-judge-cdn","version":"%s","description":"CDN assets for WerewolfGameJudge","files":["assets/"]}' "$PKG_VERSION" > "$WORK/package.json"
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$WORK/.npmrc"
          cd "$WORK"
          npm publish --access public
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Published werewolf-judge-cdn@$PKG_VERSION"

      - name: Sync npmmirror and wait
        run: |
          PKG_VERSION="${{ steps.npm.outputs.version }}"
          # Trigger sync
          curl -sX PUT "https://registry-direct.npmmirror.com/-/package/werewolf-judge-cdn/syncs"
          # Poll until npmmirror has the version (up to 120s)
          for i in $(seq 1 24); do
            if curl -sf "https://registry.npmmirror.com/werewolf-judge-cdn/$PKG_VERSION" > /dev/null 2>&1; then
              echo "✅ npmmirror synced werewolf-judge-cdn@$PKG_VERSION"
              exit 0
            fi
            echo "⏳ Waiting for npmmirror sync... ($((i*5))s)"
            sleep 5
          done
          echo "❌ npmmirror sync timeout after 120s"
          exit 1

      - name: Rewrite HTML to use npmmirror CDN
        run: |
          CDN_BASE="https://cdn.npmmirror.com/packages/werewolf-judge-cdn/${{ steps.npm.outputs.version }}/files"
          perl -i -pe "s|src=\"/assets/js/|src=\"${CDN_BASE}/assets/js/|g" dist/index.html
          echo "✅ script src rewritten to ${CDN_BASE}/assets/js/"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: pages deploy dist --project-name=werewolfgamejudge
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Purge CDN cache
        run: |
          curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

  deploy-miniapp:
    runs-on: ubuntu-latest
    if: |
      needs.quality.result == 'success' &&
      github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check miniapp changes
        id: changes
        run: |
          # Upload on release commits OR miniapp/ file changes
          COMMIT_MSG=$(git log -1 --pretty=%s)
          if echo "$COMMIT_MSG" | grep -q '^release:'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD~1 HEAD -- miniapp/ | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version-file: '.nvmrc'

      - name: Upload to WeChat Mini Program
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "${{ secrets.MINIAPP_UPLOAD_KEY }}" > /tmp/miniapp-key.pem
          VERSION=$(node -p "require('./package.json').version")
          npx miniprogram-ci upload \
            --pp miniapp \
            --pkp /tmp/miniapp-key.pem \
            --appid wx7f0c3bea5873908c \
            --uv "$VERSION" \
            --desc "CI deploy: $(git log -1 --pretty=%s)" \
            -r 1
          rm -f /tmp/miniapp-key.pem

  e2e:
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.quality.result == 'success'
    needs: [quality]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # ── Playwright ──────────────────────────────────────
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(pnpm exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }}/4)
        run: pnpm exec playwright test --shard=${{ matrix.shard }}/4 --reporter=list --reporter=blob

      - name: Upload blob report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    runs-on: ubuntu-latest
    if: always() && needs.e2e.result != 'skipped'
    needs: e2e
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Download blob reports
        uses: actions/download-artifact@v8
        with:
          pattern: blob-report-*
          path: all-blob-reports
          merge-multiple: true

      - name: Merge reports
        run: pnpm exec playwright merge-reports --reporter=html ./all-blob-reports

      - name: Upload merged report
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload report to Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: playwright-report/

  deploy-report:
    runs-on: ubuntu-latest
    if: always() && needs.merge-reports.result == 'success' && github.ref == 'refs/heads/main'
    needs: merge-reports
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add report link to summary
        run: |
          echo "## 📊 Playwright Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "👉 [${{ steps.deployment.outputs.page_url }}](${{ steps.deployment.outputs.page_url }})" >> $GITHUB_STEP_SUMMARY
