name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1' # Every Monday 11:00 Asia/Shanghai

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: renovatebot/github-action@v42
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
