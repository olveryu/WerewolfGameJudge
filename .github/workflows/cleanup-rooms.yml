name: Daily Cleanup

on:
  schedule:
    # 每天 UTC 03:00 运行 (北京时间 11:00)
    - cron: '0 3 * * *'
  workflow_dispatch: # 允许手动触发

permissions: {}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      ANON_CLEANUP_BATCH_SIZE: 1000
      ANON_CLEANUP_MAX_BATCHES: 20
      ANON_CLEANUP_DAILY_THRESHOLD: 5000
    steps:
      - name: Delete rooms older than 24 hours
        run: |
          # Calculate timestamp for 24 hours ago
          CUTOFF=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%S.000Z')
          echo "Deleting rooms created before: $CUTOFF"

          # Delete old rooms via Supabase REST API
          response=$(curl -s -X DELETE \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/rooms?created_at=lt.$CUTOFF")

          # Count deleted rooms
          count=$(echo "$response" | jq 'length // 0')

          if [ "$count" -gt 0 ]; then
            echo "✅ Deleted $count old room(s)"
            echo "$response" | jq -r '.[].code' | while read code; do
              echo "  - Room: $code"
            done
          else
            echo "✅ No rooms older than 24 hours found"
          fi

      - name: Delete anonymous users inactive for 14 days
        run: |
          total_deleted=0

          for ((i=1; i<=ANON_CLEANUP_MAX_BATCHES; i++)); do
            response=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Content-Type: application/json" \
              -d "{\"p_limit\": ${ANON_CLEANUP_BATCH_SIZE}}" \
              "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/cleanup_anonymous_users")

            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | sed '$d')

            if [ "$http_code" -ne 200 ]; then
              echo "❌ Failed to cleanup anonymous users (HTTP $http_code)"
              echo "$body"
              exit 1
            fi

            batch_deleted=$(echo "$body" | tr -d '[:space:]')
            if ! [[ "$batch_deleted" =~ ^[0-9]+$ ]]; then
              echo "❌ Unexpected RPC response body: $body"
              exit 1
            fi

            total_deleted=$((total_deleted + batch_deleted))
            echo "Batch $i: deleted $batch_deleted anonymous user(s)"

            if [ "$batch_deleted" -eq 0 ]; then
              break
            fi
          done

          echo "✅ Total deleted $total_deleted anonymous user(s) inactive for 14+ days"

          if [ "$total_deleted" -gt "$ANON_CLEANUP_DAILY_THRESHOLD" ]; then
            echo "❌ Anomaly: deleted $total_deleted anonymous users, exceeding threshold $ANON_CLEANUP_DAILY_THRESHOLD"
            exit 1
          fi
