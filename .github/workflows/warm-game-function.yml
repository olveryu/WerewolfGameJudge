name: Warm Game Function

on:
  schedule:
    # Every 15 minutes (UTC) to reduce cold-start impact on first user action
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions: {}

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - name: Warm Supabase game function health endpoint
        run: |
          http_code=$(curl -s -o /tmp/warm_game_resp.json -w "%{http_code}" \
            -X GET \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/game/health")

          if [ "$http_code" -ne 200 ]; then
            echo "❌ Warmup failed with HTTP $http_code"
            cat /tmp/warm_game_resp.json
            exit 1
          fi

          echo "✅ Warmup succeeded"
          cat /tmp/warm_game_resp.json
