#:schema ./node_modules/wrangler/config-schema.json
# ── Test-only wrangler config ────────────────────────────────────────────────
# Used by vitest-pool-workers. Excludes remote-only bindings ([ai], routes,
# triggers) so tests run locally via miniflare without Cloudflare auth.
name = "werewolf-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database (local miniflare) ───────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "werewolf-db"
database_id = "f6ddfa17-8a27-442c-b6c0-6abf56f06a43"

# ── R2 Bucket (local miniflare) ─────────────────────────────────────────────
[[r2_buckets]]
binding = "AVATARS"
bucket_name = "werewolf-avatars"

# ── Durable Objects ─────────────────────────────────────────────────────────
[durable_objects]
bindings = [
  { name = "GAME_ROOM", class_name = "GameRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

# NOTE: [ai], [[routes]], [triggers] are intentionally omitted.
# AI binding requires remote proxy (Cloudflare auth), which is unavailable in CI.
