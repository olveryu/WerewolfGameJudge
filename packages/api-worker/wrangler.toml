#:schema ./node_modules/wrangler/config-schema.json
name = "werewolf-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# ── Observability (Workers Logs + Traces — structured JSON, dashboard 可查询) ─
[observability]
enabled = true

[observability.traces]
enabled = true

# ── Smart Placement (自动将 Worker 调度到离后端服务更近的节点) ────────────
[placement]
mode = "smart"

# ── D1 Database ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "werewolf-db"
database_id = "f6ddfa17-8a27-442c-b6c0-6abf56f06a43"

# ── R2 Bucket (Phase 3: avatar storage + share images) ──────────────────────
[[r2_buckets]]
binding = "AVATARS"
bucket_name = "werewolf-avatars"
# Lifecycle rules (managed via `wrangler r2 bucket lifecycle`, not configurable in toml):
#   - share/ prefix: expire after 1 day (temporary share images)
#   - all prefixes: abort incomplete multipart uploads after 7 days

# ── Durable Objects (Phase 2: realtime) ──────────────────────────────────────
[durable_objects]
bindings = [
  { name = "GAME_ROOM", class_name = "GameRoom" },
  { name = "WECHAT_AUTH", class_name = "WeChatAuthProxy" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["WeChatAuthProxy"]

# ── Workers AI Binding ───────────────────────────────────────────────────────
[ai]
binding = "AI"

# ── Analytics Engine (load timing telemetry, 90-day auto-expiry) ─────────────
[[analytics_engine_datasets]]
binding = "LOAD_TIMING"
dataset = "load_timing"

# ── Custom Domain (workers.dev 在中国大陆不可达) ────────────────────────────────
[[routes]]
pattern = "api.werewolfjudge.eu.org"
custom_domain = true

# ── Environment Variables ────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "*"
SENTRY_DSN = "https://ab73f1bb71521dace0123c021e0130e9@o4510871644209152.ingest.us.sentry.io/4511310645035008"

# ── Cron Triggers ────────────────────────────────────────────────────────────
[triggers]
crons = ["0 3 * * *"]   # Daily at UTC 03:00 — cleanup stale rooms / anonymous users / login attempts

# ── Local Dev Server ─────────────────────────────────────────────────────────
# Bind to localhost so Expo Web (localhost:8081) and wrangler share the same
# hostname, avoiding cross-origin preflight issues in the browser.
[dev]
ip = "localhost"
port = 8787

# ── Development Overrides ────────────────────────────────────────────────────
[env.dev]
vars = { ENVIRONMENT = "development", CORS_ORIGIN = "*", SENTRY_DSN = "" }
