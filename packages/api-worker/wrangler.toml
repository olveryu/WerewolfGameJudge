#:schema ./node_modules/wrangler/config-schema.json
name = "werewolf-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

# ── D1 Database ──────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "werewolf-db"
database_id = "f6ddfa17-8a27-442c-b6c0-6abf56f06a43"

# ── R2 Bucket (Phase 3: avatar storage) ─────────────────────────────────────
[[r2_buckets]]
binding = "AVATARS"
bucket_name = "werewolf-avatars"

# ── Durable Objects (Phase 2: realtime) ──────────────────────────────────────
[durable_objects]
bindings = [
  { name = "GAME_ROOM", class_name = "GameRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

# ── Custom Domain (workers.dev 在中国大陆不可达) ────────────────────────────────
[[routes]]
pattern = "api.werewolfjudge.eu.org"
custom_domain = true

# ── Environment Variables ────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "*"

# ── Cron Triggers ────────────────────────────────────────────────────────────
[triggers]
crons = ["0 3 * * *"]   # Daily at UTC 03:00 — cleanup stale anonymous users

# ── Local Dev Server ─────────────────────────────────────────────────────────
# Bind to localhost so Expo Web (localhost:8081) and wrangler share the same
# hostname, avoiding cross-origin preflight issues in the browser.
[dev]
ip = "localhost"
port = 8787

# ── Development Overrides ────────────────────────────────────────────────────
[env.dev]
vars = { ENVIRONMENT = "development", CORS_ORIGIN = "*" }
