<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- PWA Meta Tags - 使用 light 主题颜色 -->
    <meta name="theme-color" content="#6366F1" />
    <meta name="background-color" content="#FAFAFA" />
    <meta name="description" content="本地/离线狼人杀游戏辅助工具，支持多人联机" />

    <!-- PWA / iOS Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="狼人杀电子法官" />
    <meta name="format-detection" content="telephone=no" />

    <!-- iOS Icons -->
    <link rel="apple-touch-icon" href="/assets/pwa/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/pwa/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/assets/pwa/apple-touch-icon-ipad.png" />

    <!-- iOS Splash Screens (will use icon as fallback) -->
    <link rel="apple-touch-startup-image" href="/assets/pwa/icon-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/pwa/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/pwa/icon-512.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Preload CanvasKit WASM (Skia animations) — starts download before JS execution -->
    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/npm/canvaskit-wasm@0.40.0/bin/full/canvaskit.wasm"
      as="fetch"
      crossorigin="anonymous"
    />

    <title>狼人杀电子法官</title>

    <!-- Expo required reset styles -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%; /* fallback */
        height: 100dvh; /* 现代浏览器动态视口 */
        height: calc(var(--vh, 1vh) * 100); /* JS fallback (不支持 dvh 的旧内核) */
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        height: 100dvh;
        height: calc(var(--vh, 1vh) * 100);
        flex: 1;
      }
    </style>

    <style>
      /* 全屏样式 - 使用 light 主题默认背景色 */
      html,
      body,
      #root {
        width: 100%;
        margin: 0;
        padding: 0;
        background-color: #fafafa;
        /* 防止双击缩放延迟，替代 user-scalable=no（保留无障碍缩放能力） */
        touch-action: manipulation;
      }

      /* iOS 安全区域适配 */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      /* 启动画面样式 - 使用 light 主题 primary 色 */
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
        height: calc(var(--vh, 1vh) * 100);
        background-color: #fafafa;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }

      #splash-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #splash-screen img {
        width: 120px;
        height: 120px;
        border-radius: 24px;
        animation: pulse 2s ease-in-out infinite;
      }

      #splash-screen .loading-text {
        color: #52525b;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        margin-top: 20px;
        opacity: 0.7;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.05);
          opacity: 0.8;
        }
      }

      /* Indeterminate progress bar — matches LoadingScreen component */
      #splash-screen .progress-track {
        width: 60%;
        max-width: 240px;
        height: 3px;
        border-radius: 2px;
        background-color: #dddde3;
        overflow: hidden;
        margin-top: 20px;
      }

      #splash-screen .progress-bar {
        width: 30%;
        height: 100%;
        border-radius: 2px;
        background-color: #6366f1;
        animation: slide 1.5s linear infinite;
      }

      @keyframes slide {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(333%);
        }
      }

      /* 微信 WebView 引导蒙层 */
      #wechat-guide {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.75);
        z-index: 99999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }

      #wechat-guide .guide-arrow {
        position: absolute;
        top: 16px;
        right: 24px;
        font-size: 48px;
        animation: bounce-arrow 1.5s ease-in-out infinite;
      }

      #wechat-guide .guide-icon {
        font-size: 64px;
        margin-bottom: 24px;
      }

      #wechat-guide .guide-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 12px;
      }

      #wechat-guide .guide-desc {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.6;
        max-width: 280px;
      }

      #wechat-guide .guide-steps {
        margin-top: 24px;
        text-align: left;
        font-size: 16px;
        line-height: 2;
      }

      @keyframes bounce-arrow {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      /* 禁用选择和长按菜单 */
      * {
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      /* 允许输入框选择 */
      input,
      textarea {
        -webkit-user-select: text;
        user-select: text;
      }
    </style>
  </head>
  <body>
    <!-- 微信 WebView 引导 - 提示用户用外部浏览器打开 -->
    <div id="wechat-guide">
      <div class="guide-arrow">↗</div>
      <div class="guide-icon">🌐</div>
      <div class="guide-title">请使用浏览器打开</div>
      <div class="guide-desc">微信内置浏览器功能受限，请使用外部浏览器以获得最佳体验</div>
      <div class="guide-steps">
        ① 点击右上角 <strong>⋯</strong> 菜单<br />
        ② 选择「<strong>在浏览器中打开</strong>」
      </div>
    </div>

    <!-- 启动画面 -->
    <div id="splash-screen">
      <img src="/assets/pwa/icon-192.png" alt="狼人杀电子法官" />
      <div class="loading-text">加载中...</div>
      <div class="progress-track"><div class="progress-bar"></div></div>
    </div>

    <div id="root"></div>

    <script>
      // PWA 安装事件拦截（Android/桌面 Chrome 触发，iOS 不触发）
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
      });

      // 微信 WebView 检测：引导用户用外部浏览器打开
      // localhost 排除，方便开发调试
      var ua = navigator.userAgent;
      var isWechat = /MicroMessenger/i.test(ua);
      if (isWechat && location.hostname !== 'localhost') {
        var guide = document.getElementById('wechat-guide');
        if (guide) guide.style.display = 'flex';
      }

      // 动态视口高度（修复移动浏览器 100vh 不准，Safari/Chrome 地址栏收缩）
      (function () {
        function setVH() {
          document.documentElement.style.setProperty('--vh', window.innerHeight * 0.01 + 'px');
        }
        window.addEventListener('resize', setVH);
        window.addEventListener('orientationchange', setVH);
        setVH();
      })();

      // 主题颜色映射（与 src/theme/themes.ts 保持同步）
      var THEMES = {
        light: { background: '#F5F5F7', text: '#5C5C70', primary: '#5B5BD6', isDark: false },
        dark: { background: '#121214', text: '#9898A8', primary: '#7C7CFF', isDark: true },
        jade: { background: '#F3F7F6', text: '#4A6060', primary: '#2A8A7A', isDark: false },
        sand: { background: '#F3EDE4', text: '#6D5D48', primary: '#886830', isDark: false },
        midnight: { background: '#0B0B14', text: '#9696B8', primary: '#8B5CF6', isDark: true },
        blood: { background: '#110B0B', text: '#C89898', primary: '#DC3B3B', isDark: true },
        forest: { background: '#0A1210', text: '#7DC8A0', primary: '#3DD68C', isDark: true },
        sky: { background: '#F4F6FA', text: '#556070', primary: '#4A7FBB', isDark: false },
      };

      // 读取用户保存的主题，应用到 splash
      (function () {
        var themeKey = 'dark';
        var settings = localStorage.getItem('@werewolf_settings');
        if (settings) {
          try {
            var parsed = JSON.parse(settings);
            if (parsed.themeKey) themeKey = parsed.themeKey;
          } catch (e) {}
        }
        var theme = THEMES[themeKey] || THEMES.dark;

        // 应用背景色
        document.documentElement.style.backgroundColor = theme.background;
        document.body.style.backgroundColor = theme.background;
        document.documentElement.style.color = theme.text;
        document.documentElement.style.setProperty('--theme-primary', theme.primary);

        var splash = document.getElementById('splash-screen');
        if (splash) {
          splash.style.backgroundColor = theme.background;
          var text = splash.querySelector('.loading-text');
          if (text) text.style.color = theme.text;
        }

        // 更新 theme-color meta
        var themeMeta = document.querySelector('meta[name="theme-color"]');
        if (themeMeta) themeMeta.content = theme.primary;
      })();

      // 隐藏启动画面 — 由 React App.tsx 控制。
      // 这里仅作超时 fallback（5 秒后强制隐藏，防止 JS 加载失败时永久卡 splash）。
      window.addEventListener('load', function () {
        setTimeout(function () {
          var splash = document.getElementById('splash-screen');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(function () {
              splash.remove();
            }, 300);
          }
        }, 5000);
      });

      // Stale Tab Auto-Reload：iOS Safari 长时间后台后 WebSocket/JS 运行时可能不可恢复，
      // 社区标准做法（Slack/Discord/Figma PWA）— 超过阈值直接 reload 重建所有连接。
      // URL linking + DB 持久化保证 reload 后导航状态和游戏状态完整恢复。
      (function () {
        var STALE_THRESHOLD_MS = 5 * 60 * 1000; // 5 minutes
        var lastHiddenAt = 0;

        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'hidden') {
            lastHiddenAt = Date.now();
          } else if (document.visibilityState === 'visible' && lastHiddenAt > 0) {
            if (Date.now() - lastHiddenAt > STALE_THRESHOLD_MS) {
              console.log('Stale tab detected, reloading…');
              window.location.reload();
            }
          }
        });
      })();

      // 注册 Service Worker（如果支持）
      if ('serviceWorker' in navigator) {
        // 首次安装时 controller 为 null，此时 controllerchange 不应 reload
        var hadController = !!navigator.serviceWorker.controller;
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (!hadController || refreshing) return;
          refreshing = true;
          window.location.reload();
        });

        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js', { updateViaCache: 'none' })
            .then(function (reg) {
              // 检测新 SW 安装完毕 → 自动触发更新（全屏蒙层覆盖白屏）
              // 只在真正有新部署时触发（build.sh 用 git hash，同 commit 不变）
              function onNewSW(sw) {
                if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                  showUpdateOverlay(sw);
                }
              }
              if (reg.waiting) {
                showUpdateOverlay(reg.waiting);
              }
              if (reg.installing) {
                reg.installing.addEventListener('statechange', function () {
                  onNewSW(this);
                });
              }
              reg.addEventListener('updatefound', function () {
                var newSW = reg.installing;
                if (newSW) {
                  newSW.addEventListener('statechange', function () {
                    onNewSW(this);
                  });
                }
              });

              // 主动轮询新版本：每 30 分钟检查一次 sw.js 是否有变化
              setInterval(
                function () {
                  reg.update().catch(function () {});
                },
                30 * 60 * 1000,
              );

              // 用户切回前台时检查新版本（60s debounce 防止频繁切换）
              var lastVisibilityCheck = 0;
              document.addEventListener('visibilitychange', function () {
                if (document.visibilityState !== 'visible') return;
                var now = Date.now();
                if (now - lastVisibilityCheck < 60 * 1000) return;
                lastVisibilityCheck = now;
                reg.update().catch(function () {});
              });
            })
            .catch(function (err) {
              console.log('ServiceWorker registration failed:', err);
            });
        });
      }

      // 弹窗式更新：先显示确认对话框，用户点击后再执行 SKIP_WAITING → reload
      function showUpdateOverlay(waitingSW) {
        if (document.getElementById('sw-update-overlay')) return;
        var bg = document.body.style.backgroundColor || '#121214';
        var textColor = document.documentElement.style.color || '#9898A8';
        var primaryColor =
          document.documentElement.style.getPropertyValue('--theme-primary') || '#6366F1';

        var overlay = document.createElement('div');
        overlay.id = 'sw-update-overlay';
        overlay.style.cssText =
          'position:fixed;top:0;left:0;width:100%;height:100%;' +
          'background:rgba(0,0,0,0.5);' +
          'display:flex;align-items:center;justify-content:center;' +
          'z-index:99999;font-family:-apple-system,BlinkMacSystemFont,sans-serif;';

        var card = document.createElement('div');
        card.style.cssText =
          'background:' +
          bg +
          ';border-radius:16px;padding:32px 28px 24px;' +
          'display:flex;flex-direction:column;align-items:center;' +
          'max-width:300px;width:80%;box-shadow:0 8px 32px rgba(0,0,0,0.3);';

        card.innerHTML =
          '<img src="/assets/pwa/icon-192.png" alt="" style="width:64px;height:64px;border-radius:16px;margin-bottom:16px;" />' +
          '<div style="color:' +
          textColor +
          ';font-size:17px;font-weight:600;margin-bottom:8px;">发现新版本</div>' +
          '<div style="color:' +
          textColor +
          ';font-size:14px;opacity:0.7;margin-bottom:24px;text-align:center;">新版本已准备就绪，更新后即可使用</div>' +
          '<button id="sw-update-btn" style="' +
          'width:100%;padding:12px 0;border:none;border-radius:10px;' +
          'background:' +
          primaryColor +
          ';color:#fff;font-size:16px;font-weight:600;' +
          'cursor:pointer;transition:opacity 0.2s;' +
          '">立即更新</button>' +
          '<div id="sw-update-progress" style="display:none;width:100%;margin-top:16px;">' +
          '<div style="width:100%;height:4px;border-radius:2px;background:rgba(128,128,128,0.2);overflow:hidden;">' +
          '<div id="sw-update-bar" style="width:0%;height:100%;border-radius:2px;background:' +
          primaryColor +
          ';transition:width 0.3s ease;"></div>' +
          '</div>' +
          '<div style="color:' +
          textColor +
          ';font-size:13px;opacity:0.6;margin-top:8px;text-align:center;">正在更新...</div>' +
          '</div>';

        overlay.appendChild(card);
        document.body.appendChild(overlay);

        document.getElementById('sw-update-btn').addEventListener('click', function () {
          // 隐藏按钮，显示进度条
          this.style.display = 'none';
          document.getElementById('sw-update-progress').style.display = 'block';

          var bar = document.getElementById('sw-update-bar');
          setTimeout(function () {
            bar.style.width = '30%';
          }, 100);
          setTimeout(function () {
            bar.style.width = '70%';
          }, 600);

          // 触发更新
          waitingSW.postMessage('SKIP_WAITING');
          // controllerchange → reload 会自动发生
          // 兜底：如果 3 秒内没 reload，强制刷新
          setTimeout(function () {
            bar.style.width = '100%';
            setTimeout(function () {
              window.location.reload();
            }, 300);
          }, 3000);
        });
      }
    </script>
  </body>
</html>
