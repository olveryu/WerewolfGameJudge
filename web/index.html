<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- PWA Meta Tags - 使用 light 主题颜色 -->
    <meta name="theme-color" content="#FFFFFF" />
    <meta name="background-color" content="#F2F2F7" />
    <meta name="description" content="本地/离线狼人杀游戏辅助工具，支持多人联机" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="狼人面杀电子裁判助手" />
    <meta property="og:description" content="在线狼人杀裁判助手，输入房间号即可加入游戏" />
    <meta property="og:image" content="https://werewolfjudge.eu.org/assets/pwa/icon-512.png" />
    <meta property="og:url" content="https://werewolfjudge.eu.org" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:site_name" content="狼人面杀电子裁判助手" />

    <!-- PWA / iOS Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="狼人面杀电子裁判助手" />
    <meta name="format-detection" content="telephone=no" />

    <!-- iOS Icons -->
    <link rel="apple-touch-icon" href="/assets/pwa/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/pwa/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/assets/pwa/apple-touch-icon-ipad.png" />

    <!-- iOS Splash Screens (will use icon as fallback) -->
    <link rel="apple-touch-startup-image" href="/assets/pwa/icon-512.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/pwa/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/pwa/icon-512.png" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <title>狼人面杀电子裁判助手</title>

    <!-- Expo required reset styles -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%; /* fallback */
        height: calc(var(--vh, 1vh) * 100); /* JS fallback — 旧内核 / 不支持 dvh */
        height: -webkit-fill-available; /* WebKit PWA / WebView 兜底 */
        height: 100dvh; /* 现代浏览器最终胜出 — 支持 dvh 时覆盖上面所有声明 */
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
        background-color: #0a0a12;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        height: calc(var(--vh, 1vh) * 100);
        height: -webkit-fill-available;
        height: 100dvh;
        flex: 1;
      }
    </style>

    <style>
      /* 全屏样式 — 初始暗色匹配 splash，dismissWebSplash 后切换到主题色 */
      html,
      body,
      #root {
        width: 100%;
        margin: 0;
        padding: 0;
        background-color: #0a0a12;
        /* 防止双击缩放延迟，替代 user-scalable=no（保留无障碍缩放能力） */
        touch-action: manipulation;
      }

      /*
       * iOS 安全区域由 react-native-safe-area-context 的 SafeAreaView 统一处理。
       * 不在 body 上加 env() padding，避免与 SafeAreaView (additive mode) 双重扣减。
       * viewport-fit=cover 保留在 <meta viewport> 中，让浏览器暴露 inset 值给 JS 读取。
       */

      /* 启动画面样式 — 全屏背景图 + 底部加载信息 */
      #splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        height: calc(var(--vh, 1vh) * 100);
        height: -webkit-fill-available;
        height: 100dvh;
        background-color: #0a0a12;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
        overflow: hidden;
      }

      #splash-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* 全屏背景图 */
      #splash-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
      }

      /* 底部渐变遮罩，让文字/进度条可读 */
      #splash-screen::before {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 45%;
        background: linear-gradient(
          to bottom,
          transparent,
          rgba(8, 8, 16, 0.85) 70%,
          rgba(8, 8, 16, 0.95)
        );
        z-index: 1;
        pointer-events: none;
      }

      /* 标题区域 */
      #splash-title {
        position: absolute;
        top: 62%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 2;
        user-select: none;
        -webkit-user-select: none;
      }

      #splash-title .main-title {
        font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
        font-size: 40px;
        font-weight: 900;
        letter-spacing: 10px;
        background: linear-gradient(180deg, #fff 0%, #c8d0e0 40%, #a0b0d0 60%, #e8e8f0 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        -webkit-text-stroke: 0.5px rgba(255, 255, 255, 0.3);
        filter: drop-shadow(0 0 20px rgba(140, 160, 255, 0.5))
          drop-shadow(0 4px 12px rgba(0, 0, 0, 0.8));
      }

      #splash-title .divider {
        width: 120px;
        height: 1px;
        margin: 10px 0;
        background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.5), transparent);
      }

      #splash-title .sub-title {
        font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', sans-serif;
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 6px;
        color: rgba(255, 255, 255, 0.6);
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
      }

      /* 底部加载区域（在渐变遮罩之上） */
      #splash-bottom {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-bottom: max(env(safe-area-inset-bottom, 0px), 48px);
        width: 100%;
      }

      #splash-screen .loading-text {
        color: rgba(255, 255, 255, 0.75);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
      }

      #splash-resource {
        color: rgba(255, 255, 255, 0.5);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
        font-size: 11px;
        margin-top: 12px;
        max-width: 80%;
        text-align: center;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-height: 16px;
      }

      /* Real-progress bar — driven by PerformanceObserver resource count */
      #splash-screen .progress-track {
        width: 60%;
        max-width: 240px;
        height: 3px;
        border-radius: 2px;
        background-color: rgba(255, 255, 255, 0.15);
        overflow: hidden;
        margin-top: 16px;
      }

      #splash-screen .progress-bar {
        width: 0;
        height: 100%;
        border-radius: 2px;
        background-color: rgba(255, 255, 255, 0.7);
        transition: width 0.3s ease;
      }

      #splash-refresh {
        display: none;
        margin-top: 24px;
        padding: 10px 28px;
        border: none;
        border-radius: 8px;
        background-color: rgba(255, 255, 255, 0.15);
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        cursor: pointer;
        transition: opacity 0.2s;
        -webkit-user-select: none;
        user-select: none;
      }

      #splash-refresh:active {
        opacity: 0.7;
      }

      /* 微信 WebView 引导蒙层 */
      #wechat-guide {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.75);
        z-index: 99999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }

      #wechat-guide .guide-arrow {
        position: absolute;
        top: 16px;
        right: 24px;
        font-size: 48px;
        animation: bounce-arrow 1.5s ease-in-out infinite;
      }

      #wechat-guide .guide-icon {
        font-size: 64px;
        margin-bottom: 24px;
      }

      #wechat-guide .guide-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 12px;
      }

      #wechat-guide .guide-desc {
        font-size: 15px;
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.6;
        max-width: 280px;
      }

      #wechat-guide .guide-steps {
        margin-top: 24px;
        text-align: left;
        font-size: 16px;
        line-height: 2;
      }

      @keyframes bounce-arrow {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      /* 禁用选择和长按菜单 */
      * {
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      /* 允许输入框选择 */
      input,
      textarea {
        -webkit-user-select: text;
        user-select: text;
      }
    </style>
  </head>
  <body>
    <!-- 微信 WebView 引导 - 提示用户用外部浏览器打开 -->
    <div id="wechat-guide">
      <div class="guide-arrow">↗</div>
      <div class="guide-icon">🌐</div>
      <div class="guide-title">请使用浏览器打开</div>
      <div class="guide-desc">微信内置浏览器功能受限，请使用外部浏览器以获得最佳体验</div>
      <div class="guide-steps">
        ① 点击右上角 <strong>⋯</strong> 菜单<br />
        ② 选择「<strong>在浏览器中打开</strong>」
      </div>
    </div>

    <!-- 启动画面 -->
    <div id="splash-screen">
      <img id="splash-bg" src="" alt="" />
      <div id="splash-title">
        <div class="main-title">狼 人 杀</div>
        <div class="divider"></div>
        <div class="sub-title">电 子 裁 判</div>
      </div>
      <div id="splash-bottom">
        <div class="loading-text">加载中... <span id="splash-pct">0%</span></div>
        <div class="progress-track"><div class="progress-bar"></div></div>
        <div id="splash-resource"></div>
        <button id="splash-refresh">刷新页面</button>
      </div>
    </div>
    <script>
      // 随机选择 splash 背景图（同一 session 内固定，避免缓存恢复时闪烁）
      (function () {
        var imgs = [
          '/assets/pwa/web/splash-wolf-blue.webp',
          '/assets/pwa/web/splash-wolf-red.webp',
          '/assets/pwa/web/splash-wolf-gold.webp',
        ];
        var key = '__splash_idx';
        var idx = parseInt(sessionStorage.getItem(key), 10);
        if (isNaN(idx) || idx < 0 || idx >= imgs.length) {
          idx = Math.floor(Math.random() * imgs.length);
          try {
            sessionStorage.setItem(key, idx);
          } catch (e) {}
        }
        var bg = document.getElementById('splash-bg');
        if (bg) bg.src = imgs[idx];
      })();
    </script>

    <div id="root"></div>

    <script>
      // PWA 安装事件拦截（Android/桌面 Chrome 触发，iOS 不触发）
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
      });

      // 微信 WebView 检测（按官方文档 3 种方式）：
      // 1. UA 含 miniProgram — 微信 7.0.0+ web-view 注入，同步可用
      // 2. window.__wxjs_environment === 'miniprogram' — 需等 WeixinJSBridgeReady
      // 3. wx.miniProgram.getEnv() — 需 JSSDK 加载，此处不用（太晚）
      //
      // 策略：
      // - UA 快速路径：立即判定小程序 → 放行
      // - 微信浏览器但 UA 无 miniProgram → 等 WeixinJSBridgeReady（最多 1s 超时）
      //   Bridge ready 后检查 __wxjs_environment；超时视为普通微信浏览器 → 显示引导
      // - 非微信 → 正常加载
      // - localhost 排除，方便开发调试
      var ua = navigator.userAgent;
      var isWechat = /MicroMessenger/i.test(ua);
      var isMiniProgram = /miniProgram/i.test(ua);

      function showWechatGuide() {
        var guide = document.getElementById('wechat-guide');
        if (guide) guide.style.display = 'flex';
        // 标记跳过 React 挂载 + Skia WASM 下载（节省带宽）。
        // 不移除 #root — 移除 DOM 节点不阻止 JS 执行，反而导致
        // registerRootComponent 找不到 rootTag 而 Invariant Violation。
        // 引导蒙层 z-index: 99999 已完全遮挡底层内容。
        window.__SKIP_APP = true;
      }

      function loadJSSDK() {
        var s = document.createElement('script');
        s.src = 'https://res.wx.qq.com/open/js/jweixin-1.3.2.js';
        document.head.appendChild(s);
      }

      if (isWechat && location.hostname !== 'localhost') {
        if (isMiniProgram) {
          // UA 快速路径：确定是小程序 web-view → 放行 + 加载 JSSDK
          loadJSSDK();
        } else {
          // UA 无 miniProgram — 可能是微信浏览器，也可能是 TBS 未注入 UA 的小程序
          // 按微信文档等 WeixinJSBridgeReady 再检查 __wxjs_environment
          var resolved = false;

          function resolveEnv() {
            if (resolved) return;
            resolved = true;
            if (window.__wxjs_environment === 'miniprogram') {
              // 小程序 web-view（Bridge ready 后确认）→ 放行 + 加载 JSSDK
              isMiniProgram = true;
              loadJSSDK();
            } else {
              // 确认是微信浏览器 → 显示引导
              showWechatGuide();
            }
          }

          if (window.WeixinJSBridge) {
            // Bridge 已就绪（罕见但可能：脚本执行晚于 Bridge 初始化）
            resolveEnv();
          } else {
            document.addEventListener('WeixinJSBridgeReady', resolveEnv, false);
            // 超时兜底：1s 内 Bridge 未 ready → 视为微信浏览器
            setTimeout(resolveEnv, 1000);
          }
        }
      }

      // 动态视口高度（修复移动浏览器 100vh 不准，Safari/Chrome 地址栏收缩）
      // 优先 visualViewport.height — 在 iOS PWA standalone / WeChat web-view 中
      // 包含 safe area，比 window.innerHeight 更准确。
      (function () {
        function setVH() {
          var h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
          document.documentElement.style.setProperty('--vh', h * 0.01 + 'px');
        }
        window.addEventListener('resize', setVH);
        window.addEventListener('orientationchange', setVH);
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', setVH);
        }
        setVH();
      })();

      // 主题颜色映射（与 src/theme/themes.ts 保持同步）
      var THEMES = {
        light: { background: '#F2F2F7', text: '#5C5C70', primary: '#5B5BD6', isDark: false },
        dark: { background: '#121214', text: '#9898A8', primary: '#7C7CFF', isDark: true },
        jade: { background: '#F3F7F6', text: '#4A6060', primary: '#2A8A7A', isDark: false },
        sand: { background: '#F3EDE4', text: '#6D5D48', primary: '#886830', isDark: false },
        midnight: { background: '#0B0B14', text: '#9696B8', primary: '#8B5CF6', isDark: true },
        blood: { background: '#110B0B', text: '#C89898', primary: '#DC3B3B', isDark: true },
        forest: { background: '#0A1210', text: '#7DC8A0', primary: '#3DD68C', isDark: true },
        sky: { background: '#F4F6FA', text: '#556070', primary: '#4A7FBB', isDark: false },
      };

      // 读取用户保存的主题，应用到 splash
      (function () {
        var themeKey = 'light';
        var settings = localStorage.getItem('@werewolf_settings');
        if (settings) {
          try {
            var parsed = JSON.parse(settings);
            if (parsed.themeKey && THEMES[parsed.themeKey]) themeKey = parsed.themeKey;
          } catch (e) {}
        }
        var theme = THEMES[themeKey];

        // 背景色：splash 期间用暗色（#0a0a12），避免闪白。
        // 主题背景色存入 CSS 变量，由 dismissWebSplash 在 splash 淡出后应用。
        document.documentElement.style.setProperty('--theme-bg', theme.background);
        document.documentElement.style.setProperty('--theme-primary', theme.primary);
        document.documentElement.style.color = theme.text;

        // 更新 theme-color meta
        var themeMeta = document.querySelector('meta[name="theme-color"]');
        if (themeMeta) themeMeta.content = theme.primary;
      })();

      // ── Real loading progress via PerformanceObserver ──
      // Track resource loading (JS bundles, WASM, etc.) and drive the progress bar.
      // Cap at 90% — the final 10% is set when React mounts and hides splash.
      (function () {
        var bar = document.querySelector('#splash-screen .progress-bar');
        var pctEl = document.getElementById('splash-pct');
        var resEl = document.getElementById('splash-resource');
        if (!bar) return;

        var loaded = 0;
        // Expo web typically loads ~15-25 resources (JS chunks, WASM, fonts, images).
        // Use 20 as expected total; progress is capped at 90% until React takes over.
        var EXPECTED_TOTAL = 20;

        function shortName(url) {
          try {
            var path = new URL(url).pathname;
            var segments = path.split('/');
            return segments[segments.length - 1] || path;
          } catch (e) {
            return url.split('/').pop() || url;
          }
        }

        function setProgress(pct) {
          var clamped = Math.min(Math.round(pct), 90);
          bar.style.width = clamped + '%';
          if (pctEl) pctEl.textContent = clamped + '%';
        }

        function showResource(entry) {
          if (!resEl) return;
          var name = shortName(entry.name);
          var label = friendlyName(name);
          var kb = entry.transferSize ? Math.round(entry.transferSize / 1024) : null;
          var ms = Math.round(entry.duration);
          var detail = kb ? ' (' + kb + 'KB, ' + ms + 'ms)' : ' (' + ms + 'ms)';
          resEl.textContent = '\u2713 ' + label + detail;
        }

        /** Map raw filenames to user-friendly Chinese labels */
        function friendlyName(filename) {
          if (filename.includes('canvaskit')) return '绘图引擎';
          if (filename.match(/^index[.-]/)) return '主程序';
          if (filename.includes('vendor') || filename.includes('node_modules')) return '依赖库';
          if (filename.match(/\.woff2?$|\.ttf$/)) return '字体';
          if (filename.match(/\.css$/)) return '样式表';
          if (filename.match(/\.png$|\.jpg$|\.webp$|\.svg$/)) return '图片资源';
          if (filename.match(/\.json$/)) return '配置数据';
          if (filename.match(/\.js$/)) return '功能模块';
          if (filename.match(/\.wasm$/)) return '运算引擎';
          return filename;
        }

        // Count resources already loaded before observer starts
        if (typeof performance !== 'undefined' && performance.getEntriesByType) {
          loaded = performance.getEntriesByType('resource').length;
          setProgress((loaded / EXPECTED_TOTAL) * 100);
        }

        // Observe new resources as they finish loading
        if (typeof PerformanceObserver !== 'undefined') {
          try {
            var observer = new PerformanceObserver(function (list) {
              var entries = list.getEntries();
              loaded += entries.length;
              setProgress((loaded / EXPECTED_TOTAL) * 100);
              // Show the last completed resource (most relevant to user)
              if (entries.length > 0) {
                showResource(entries[entries.length - 1]);
              }
            });
            observer.observe({ type: 'resource', buffered: false });
          } catch (e) {
            // PerformanceObserver not supported — bar stays at initial width
          }
        }

        // Minimum progress trickle: ensure bar moves even if observer is unsupported
        var trickle = setInterval(function () {
          var current = parseFloat(bar.style.width) || 0;
          if (current < 30) {
            var next = current + 2;
            bar.style.width = next + '%';
            if (pctEl) pctEl.textContent = Math.round(next) + '%';
          } else {
            clearInterval(trickle);
          }
        }, 500);

        // Listen for WASM download progress events (dispatched from index.ts)
        window.addEventListener('wasm-progress', function (e) {
          var d = e.detail;
          if (!resEl) return;
          if (d.total > 0) {
            var pct = Math.round((d.loaded / d.total) * 100);
            var loadedMB = (d.loaded / 1048576).toFixed(1);
            var totalMB = (d.total / 1048576).toFixed(1);
            resEl.textContent = '绘图引擎 ' + loadedMB + '/' + totalMB + ' MB (' + pct + '%)';
          } else {
            resEl.textContent = '绘图引擎 ' + (d.loaded / 1048576).toFixed(1) + ' MB...';
          }
        });
      })();

      // 隐藏启动画面 — 由 React App.tsx 控制。
      // 这里仅作超时 fallback（5 秒后强制隐藏，防止 JS 加载失败时永久卡 splash）。
      // 仅在 React 已挂载（#root 有子元素）时移除，否则保留 splash 避免白屏。
      // 5 秒后若 splash 仍在，显示「刷新页面」按钮（清缓存 + reload）。
      window.addEventListener('load', function () {
        setTimeout(function () {
          var root = document.getElementById('root');
          if (!root || root.children.length === 0) return;
          var splash = document.getElementById('splash-screen');
          if (splash) {
            // Set progress to 100% before hiding
            var bar = splash.querySelector('.progress-bar');
            var pctEl = document.getElementById('splash-pct');
            if (bar) bar.style.width = '100%';
            if (pctEl) pctEl.textContent = '100%';
            setTimeout(function () {
              splash.classList.add('hidden');
              setTimeout(function () {
                splash.remove();
              }, 300);
            }, 200);
          }
        }, 5000);

        // 8 秒后 splash 仍显示（React 未接管 / 加载卡住）→ 显示刷新按钮
        setTimeout(function () {
          var splash = document.getElementById('splash-screen');
          if (!splash || splash.classList.contains('hidden')) return;
          var btn = document.getElementById('splash-refresh');
          if (btn) {
            btn.style.display = 'inline-block';
          }
        }, 8000);
      });

      // 刷新按钮：强制 reload
      document.getElementById('splash-refresh').addEventListener('click', function () {
        this.textContent = '正在刷新...';
        this.disabled = true;
        window.location.reload();
      });

      // Stale Tab Auto-Reload：iOS Safari 长时间后台后 WebSocket/JS 运行时可能不可恢复，
      // 社区标准做法（Slack/Discord/Figma PWA）— 超过阈值直接 reload 重建所有连接。
      // URL linking + DB 持久化保证 reload 后导航状态和游戏状态完整恢复。
      (function () {
        var STALE_THRESHOLD_MS = 5 * 60 * 1000; // 5 minutes
        var lastHiddenAt = 0;

        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'hidden') {
            lastHiddenAt = Date.now();
          } else if (document.visibilityState === 'visible' && lastHiddenAt > 0) {
            if (Date.now() - lastHiddenAt > STALE_THRESHOLD_MS) {
              console.log('Stale tab detected, reloading…');
              window.location.reload();
            }
          }
        });
      })();

      // 清除旧 Service Worker 及其缓存（已弃用 SW 缓存策略）
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          registrations.forEach(function (r) {
            r.unregister();
          });
        });
        caches.keys().then(function (keys) {
          keys.forEach(function (k) {
            caches.delete(k);
          });
        });
      }
    </script>
  </body>
</html>
