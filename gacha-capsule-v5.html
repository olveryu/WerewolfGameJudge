<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扭蛋机 V6 — 10连一起掉</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a1a;color:#e0e0e0;font-family:-apple-system,'PingFang SC',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px}
  h2{margin-bottom:4px}.subtitle{color:#888;font-size:13px;margin-bottom:16px}
  .controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
  .controls select,.controls button{padding:10px 16px;border-radius:12px;border:none;font-size:13px;cursor:pointer}
  .controls select{background:#222;color:#fff}
  .btn-normal{background:linear-gradient(135deg,#7B8A9E,#B8C4D4);color:#1a1a2e;font-weight:600}
  .btn-golden{background:linear-gradient(135deg,#D4A24C,#F5D78E);color:#3a2a00;font-weight:600}
  .btn-normal10{background:linear-gradient(135deg,#5A6B80,#8FA0B8);color:#fff;font-weight:600}
  .btn-golden10{background:linear-gradient(135deg,#B8862E,#E8C860);color:#3a2a00;font-weight:600}
  canvas{border-radius:20px;border:1px solid rgba(255,255,255,.06);touch-action:none}
  .result-bar{margin-top:12px;padding:10px 20px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);text-align:center;min-height:48px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:14px;min-width:300px}
  .result-bar .rarity-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  #tenResultOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,20,.92);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:16px}
  #tenResultOverlay.show{display:flex}
  #tenResultOverlay h3{font-size:20px;color:#f0e0c0;margin-bottom:4px}
  .ten-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;max-width:380px;width:90%}
  .ten-cell{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 4px;text-align:center;transition:transform .3s,opacity .3s;opacity:0;transform:scale(.7)}
  .ten-cell.show{opacity:1;transform:scale(1)}
  .ten-cell .emoji{font-size:28px;display:block;margin-bottom:4px}
  .ten-cell .name{font-size:11px;font-weight:600;display:block}
  .ten-cell .rarity-label{font-size:9px;display:block;margin-top:2px;opacity:.7}
  .ten-cell.legendary{border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.08)}
  .ten-cell.epic{border-color:rgba(155,89,182,.3);background:rgba(155,89,182,.06)}
  .ten-cell.rare{border-color:rgba(74,144,217,.3);background:rgba(74,144,217,.06)}
  #tenClose{margin-top:8px;padding:12px 36px;border-radius:12px;border:none;background:linear-gradient(135deg,#444,#666);color:#fff;font-size:15px;cursor:pointer;font-weight:600}
</style>
</head>
<body>
<h2>扭蛋机 V6</h2>
<p class="subtitle">透明玻璃罩 · 疯狂旋转 · 10连一起掉</p>
<div class="controls">
  <select id="raritySelect">
    <option value="auto">自动概率</option>
    <option value="common">强制 Common</option>
    <option value="rare">强制 Rare</option>
    <option value="epic">强制 Epic</option>
    <option value="legendary">强制 Legendary</option>
  </select>
  <button class="btn-normal" onclick="startDraw('normal',1)">普通 ×1</button>
  <button class="btn-golden" onclick="startDraw('golden',1)">黄金 ×1</button>
  <button class="btn-normal10" onclick="startDraw('normal',10)">普通 ×10</button>
  <button class="btn-golden10" onclick="startDraw('golden',10)">黄金 ×10</button>
</div>
<canvas id="c" width="400" height="660"></canvas>
<div class="result-bar" id="resultBar">点击上方按钮开始抽奖</div>
<div id="tenResultOverlay">
  <h3 id="tenTitle">🎉 10连抽结果</h3>
  <div class="ten-grid" id="tenGrid"></div>
  <button id="tenClose" onclick="closeTenResult()">确认</button>
</div>

<script>
const W=400,H=660;
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const DT=1/60;

// ─── RARITY ───
const RARITIES={
  common:{label:'COMMON',color:'#9E9E9E',glow:'rgba(158,158,158,.3)',cn:'普通'},
  rare:{label:'RARE',color:'#4A90D9',glow:'rgba(74,144,217,.4)',cn:'稀有'},
  epic:{label:'EPIC',color:'#9B59B6',glow:'rgba(155,89,182,.5)',cn:'史诗'},
  legendary:{label:'LEGENDARY',color:'#F5A623',glow:'rgba(245,166,35,.5)',cn:'传说'},
};
const ITEMS={
  common:['🐺 村民','🌿 森林叶','💨 风息','❄️ 霜雾','🌊 雨滴','🪨 铁壁'],
  rare:['🏹 猎人','🛡️ 守卫','🔮 预言','🗡️ 骑士','🌸 樱飘','⚡ 雷霆'],
  epic:['🐺 狼王','🌙 血月','🧙 女巫','👁️ 先知','💜 虚空裂','⭐ 星云'],
  legendary:['👑 暗狼王','🎭 假面舞','😈 梦魇','🐉 龙鳞','✨ 天环','🌟 星临'],
};
function rollRarity(dt){
  const sel=document.getElementById('raritySelect').value;
  if(sel!=='auto')return sel;
  const r=Math.random()*100;
  if(dt==='golden'){if(r<3)return'legendary';if(r<11)return'epic';if(r<31)return'rare';return'common';}
  if(r<1.5)return'legendary';if(r<5.5)return'epic';if(r<15.5)return'rare';return'common';
}
function pickItem(rar){const l=ITEMS[rar];return l[Math.floor(Math.random()*l.length)];}

// ─── GEOMETRY ───
const DOME_CX=W/2,DOME_CY=175,DOME_R=125;
const DOME_BOTTOM=DOME_CY+DOME_R;
const HOLE_CX=W/2,HOLE_Y=DOME_BOTTOM,HOLE_HALF_W=16;
const BODY_L=W/2-140,BODY_RX=W/2+140,BODY_T=DOME_BOTTOM,BODY_B=430;
const CHUTE_TOP=BODY_B,CHUTE_BOT=478;
const FLOOR_Y=580;

// ─── PHYSICS ───
const BALL_R=14,GRAVITY=500,DAMPING=0.7,FRICTION_C=0.985,NUM_BALLS=28;
let balls=[];
let gateOpen=false;

function createBall(x,y,color){
  return{x,y,vx:0,vy:0,r:BALL_R,color,escaped:false,onFloor:false,isCapsule:false};
}
const BALL_COLORS=[
  '#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#e67e22','#1abc9c','#e84393',
  '#00b894','#6c5ce7','#fdcb6e','#fab1a0','#74b9ff','#a29bfe','#fd79a8','#55efc4',
  '#ff7675','#0984e3','#d63031','#ffeaa7','#00cec9','#e17055','#81ecec','#636e72',
  '#b2bec3','#dfe6e9','#fd79a8','#ffeaa7',
];

function initBalls(){
  balls=[];gateOpen=false;
  for(let i=0;i<NUM_BALLS;i++){
    const a=Math.random()*Math.PI*2,d=Math.random()*(DOME_R-BALL_R-10);
    balls.push(createBall(DOME_CX+Math.cos(a)*d,DOME_CY+Math.sin(a)*d,BALL_COLORS[i%BALL_COLORS.length]));
  }
}
initBalls();

function constrainToDome(b){
  if(b.escaped)return;
  const dx=b.x-DOME_CX,dy=b.y-DOME_CY,dist=Math.sqrt(dx*dx+dy*dy),maxR=DOME_R-b.r-1;
  if(gateOpen&&Math.abs(b.x-HOLE_CX)<HOLE_HALF_W&&b.y+b.r>HOLE_Y-6){
    if(b.y>HOLE_Y+b.r*0.5)b.escaped=true;
    return;
  }
  if(dist>maxR&&dist>0.01){
    const nx=dx/dist,ny=dy/dist;
    b.x=DOME_CX+nx*maxR;b.y=DOME_CY+ny*maxR;
    const dot=b.vx*nx+b.vy*ny;
    if(dot>0){b.vx-=(1+DAMPING)*dot*nx;b.vy-=(1+DAMPING)*dot*ny;}
  }
  if(!gateOpen&&b.y+b.r>HOLE_Y-1){b.y=HOLE_Y-1-b.r;if(b.vy>0)b.vy=-b.vy*DAMPING*0.4;}
}

function ballBallCollision(a,b){
  const dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy),minD=a.r+b.r;
  if(dist<minD&&dist>0.01){
    const nx=dx/dist,ny=dy/dist,ov=minD-dist;
    a.x-=nx*ov*0.5;a.y-=ny*ov*0.5;b.x+=nx*ov*0.5;b.y+=ny*ov*0.5;
    const rv=a.vx-b.vx,rvy=a.vy-b.vy,rd=rv*nx+rvy*ny;
    if(rd>0){a.vx-=rd*nx*0.5*(1+DAMPING);a.vy-=rd*ny*0.5*(1+DAMPING);b.vx+=rd*nx*0.5*(1+DAMPING);b.vy+=rd*ny*0.5*(1+DAMPING);}
  }
}

function physicsTick(dt,applyGravity){
  for(const b of balls){if(b.onFloor)continue;if(applyGravity)b.vy+=GRAVITY*dt;b.x+=b.vx*dt;b.y+=b.vy*dt;b.vx*=FRICTION_C;b.vy*=FRICTION_C;}
  for(let p=0;p<3;p++)for(let i=0;i<balls.length;i++)for(let j=i+1;j<balls.length;j++)ballBallCollision(balls[i],balls[j]);
  for(const b of balls)if(!b.escaped&&!b.onFloor)constrainToDome(b);
  for(const b of balls){
    if(!b.escaped||b.onFloor)continue;
    // Chute walls — wider during multi-drop
    const chuteHW = multiMode && multiCount > 1 ? 40 : HOLE_HALF_W;
    if(b.y<CHUTE_BOT+b.r&&b.y>HOLE_Y){
      if(b.x<HOLE_CX-chuteHW+b.r){b.x=HOLE_CX-chuteHW+b.r;b.vx=Math.abs(b.vx)*0.3;}
      if(b.x>HOLE_CX+chuteHW-b.r){b.x=HOLE_CX+chuteHW-b.r;b.vx=-Math.abs(b.vx)*0.3;}
    }
    // Below chute — let them spread out freely, but constrain to canvas
    if(b.y>=CHUTE_BOT){
      if(b.x<b.r+20){b.x=b.r+20;b.vx=Math.abs(b.vx)*0.3;}
      if(b.x>W-b.r-20){b.x=W-b.r-20;b.vx=-Math.abs(b.vx)*0.3;}
    }
    if(b.y+b.r>FLOOR_Y){
      b.y=FLOOR_Y-b.r;
      if(Math.abs(b.vy)<25){b.vy=0;b.vx=0;b.onFloor=true;}
      else{b.vy=-b.vy*0.4;b.vx*=0.7;
        for(let i=0;i<4;i++)particles.push({x:b.x+(Math.random()-.5)*12,y:FLOOR_Y,vx:(Math.random()-.5)*80,vy:-30-Math.random()*70,life:1,size:1.5+Math.random()*2});
        shakeX+=(Math.random()-.5)*4;shakeY-=1.5;}
    }
  }
}

for(let i=0;i<400;i++)physicsTick(1/60,true);

// ─── STATE ───
// Single: idle → tumbling → settling → gateOpen → dropping → autoOpenWait → opening → revealed
// Multi:  idle → tumbling → settling → multiGateOpen → multiDropping → multiOpening → (overlay)
let phase='idle';
let time=0,drawType='normal';
let tumbleTimer=0,settleTimer=0,gateTimer=0;
let openProgress=0,revealAlpha=0;
let particles=[],sparkles=[],shellPieces=[];
let flashAlpha=0,flashColor='#fff',shakeX=0,shakeY=0;
let busy=false,capsuleBall=null,dialVisualAngle=0;
let multiAutoTimer=0;

// ─── DRAW STATE ───
let multiMode=false;
let multiCount=0;
let multiResults=[];  // [{rarity, item, ball}]
let droppedBalls=[];  // refs to escaped balls (for 10-pull)
let multiOpenIndex=0; // which ball are we opening next
let multiOpenTimer=0; // timer between sequential opens in multi

// Single pull state
let capsuleRarity='common',capsuleItem='';

const TUMBLE_DUR=2.2;

function startDraw(type,count){
  if(busy)return;
  busy=true;
  drawType=type;
  multiMode=count>1;
  multiCount=count;
  multiResults=[];
  droppedBalls=[];
  multiOpenIndex=0;

  // Pre-roll all results
  for(let i=0;i<count;i++){
    const rar=rollRarity(type);
    multiResults.push({rarity:rar,item:pickItem(rar),ball:null});
  }
  // For single pull, copy to legacy vars
  if(!multiMode){capsuleRarity=multiResults[0].rarity;capsuleItem=multiResults[0].item;}

  phase='tumbling';tumbleTimer=0;settleTimer=0;gateTimer=0;
  openProgress=0;revealAlpha=0;multiAutoTimer=0;multiOpenTimer=0;
  particles=[];sparkles=[];shellPieces=[];
  flashAlpha=0;capsuleBall=null;
  const label=multiMode?'🎰 搅拌中...':'🎰 搅拌中...';
  document.getElementById('resultBar').innerHTML=label;
  document.getElementById('resultBar').style.borderColor='rgba(255,255,255,.08)';
}

function triggerOpenBall(ball){
  const idx=multiResults.findIndex(r=>r.ball===ball);
  const rar=idx>=0?multiResults[idx].rarity:'common';
  const info=RARITIES[rar];
  for(let i=0;i<10;i++){
    const a=(Math.PI*2*i)/10+(Math.random()-.5)*.4;
    shellPieces.push({
      x:ball.x,y:ball.y,
      vx:Math.cos(a)*(100+Math.random()*140),vy:Math.sin(a)*(100+Math.random()*140)-60,
      r:ball.r*(0.2+Math.random()*.3),rot:0,vrot:(Math.random()-.5)*10,alpha:1,
      color:i<5?'#ddd':`hsl(${Math.random()*360},55%,55%)`,
    });
  }
  flashColor=info.color;flashAlpha=multiMode?0.25:0.6;
  const nSparkles=multiMode?10:28;
  for(let i=0;i<nSparkles;i++){
    const a=Math.random()*Math.PI*2;
    sparkles.push({x:ball.x,y:ball.y,vx:Math.cos(a)*(40+Math.random()*120),vy:Math.sin(a)*(40+Math.random()*120),life:1,size:2+Math.random()*4,color:info.color});
  }
  shakeX+=(Math.random()-.5)*(multiMode?4:12);
  shakeY+=(Math.random()-.5)*(multiMode?4:12);
  // Mark ball as opened — remove from scene
  ball.opened=true;
}

function closeTenResult(){document.getElementById('tenResultOverlay').classList.remove('show');}

// ─── MAIN LOOP ───
function loop(){
  time+=DT;

  // ── Tumbling ──
  if(phase==='tumbling'){
    tumbleTimer+=DT;
    const progress=tumbleTimer/TUMBLE_DUR;
    let strength;
    if(progress<0.15)strength=progress/0.15;
    else if(progress<0.65)strength=1.0;
    else{strength=1-(progress-0.65)/0.35;strength=Math.max(0,strength*strength);}
    const spinDir=Math.sin(time*1.5)>0?1:-1;
    for(const b of balls){
      if(b.escaped)continue;
      const dx=b.x-DOME_CX,dy=b.y-DOME_CY,dist=Math.sqrt(dx*dx+dy*dy)||1;
      const tx=-dy/dist*spinDir,ty=dx/dist*spinDir;
      b.vx+=tx*3000*strength*DT+(Math.random()-.5)*800*strength*DT;
      b.vy+=ty*3000*strength*DT+(Math.random()-.5)*800*strength*DT;
      b.vx-=dx/dist*150*DT*strength;b.vy-=dy/dist*150*DT*strength;
    }
    dialVisualAngle+=12*DT*strength;
    shakeX+=(Math.random()-.5)*4*strength;shakeY+=(Math.random()-.5)*4*strength;
    if(tumbleTimer>=TUMBLE_DUR){phase='settling';settleTimer=0;}
  }

  // ── Settling ──
  if(phase==='settling'){
    settleTimer+=DT;
    for(const b of balls){if(!b.escaped){b.vx*=0.95;b.vy*=0.95;}}
    if(settleTimer>0.4){
      if(multiMode){
        phase='multiGateOpen';gateOpen=true;gateTimer=0;
        document.getElementById('resultBar').innerHTML='⬇️ 掉落中...';
        // Nudge bottom balls toward hole
        const sorted=[...balls].filter(b=>!b.escaped).sort((a,b)=>b.y-a.y);
        for(let i=0;i<Math.min(multiCount+2,sorted.length);i++){
          sorted[i].vy+=40+Math.random()*30;
          sorted[i].x+=(HOLE_CX-sorted[i].x)*0.3;
          sorted[i].vx+=(Math.random()-.5)*30; // spread
        }
      }else{
        phase='gateOpen';gateOpen=true;gateTimer=0;
        document.getElementById('resultBar').innerHTML='⬇️ 掉落中...';
        const sorted=[...balls].filter(b=>!b.escaped).sort((a,b)=>b.y-a.y);
        for(let i=0;i<Math.min(3,sorted.length);i++){sorted[i].vy+=50;sorted[i].x+=(HOLE_CX-sorted[i].x)*0.4;}
      }
    }
  }

  // ── Single: gate open ──
  if(phase==='gateOpen'){
    gateTimer+=DT;
    const escaped=balls.find(b=>b.escaped&&!b.opened);
    if(escaped){
      capsuleBall=escaped;capsuleBall.r=18;
      multiResults[0].ball=capsuleBall;
      phase='dropping';gateOpen=false;
    }
    if(gateTimer>2.5&&!capsuleBall){
      const low=balls.filter(b=>!b.escaped).sort((a,b)=>b.y-a.y)[0];
      if(low){low.x=HOLE_CX;low.vy=120;low.escaped=true;capsuleBall=low;capsuleBall.r=18;multiResults[0].ball=capsuleBall;phase='dropping';gateOpen=false;}
    }
  }

  // ── Multi: gate stays open until enough balls escape ──
  if(phase==='multiGateOpen'){
    gateTimer+=DT;
    // Count escaped (not yet tracked)
    const newlyEscaped=balls.filter(b=>b.escaped&&!droppedBalls.includes(b));
    for(const b of newlyEscaped){
      if(droppedBalls.length<multiCount){
        b.r=16; // slightly smaller for 10
        // Give random horizontal kick so they spread on the floor
        b.vx+=(Math.random()-.5)*200;
        droppedBalls.push(b);
        if(droppedBalls.length-1<multiResults.length)multiResults[droppedBalls.length-1].ball=b;
      }
    }
    if(droppedBalls.length>=multiCount){
      gateOpen=false;
      phase='multiDropping';
    }
    // Safety: if stuck, force balls
    if(gateTimer>4){
      while(droppedBalls.length<multiCount){
        const rem=balls.filter(b=>!b.escaped&&!b.onFloor).sort((a,b)=>b.y-a.y);
        if(rem.length===0)break;
        const b=rem[0];
        b.x=HOLE_CX+(Math.random()-.5)*20;b.vy=120;b.escaped=true;
        b.r=16;b.vx=(Math.random()-.5)*200;
        droppedBalls.push(b);
        if(droppedBalls.length-1<multiResults.length)multiResults[droppedBalls.length-1].ball=b;
      }
      gateOpen=false;phase='multiDropping';
    }
    // Keep nudging dome balls toward hole
    if(gateTimer>0.5&&droppedBalls.length<multiCount){
      for(const b of balls){
        if(!b.escaped&&!b.onFloor){
          b.x+=(HOLE_CX-b.x)*0.02;b.vy+=10*DT*60;
        }
      }
    }
  }

  // ── Multi: wait for all to land ──
  if(phase==='multiDropping'){
    const allLanded=droppedBalls.every(b=>b.onFloor||b.opened);
    if(allLanded){
      phase='multiOpening';multiOpenIndex=0;multiOpenTimer=0;
      document.getElementById('resultBar').innerHTML='✨ 开蛋中...';
    }
  }

  // ── Multi: open balls one by one ──
  if(phase==='multiOpening'){
    multiOpenTimer+=DT;
    if(multiOpenTimer>0.25&&multiOpenIndex<droppedBalls.length){
      const ball=droppedBalls[multiOpenIndex];
      if(ball&&!ball.opened)triggerOpenBall(ball);
      multiOpenIndex++;
      multiOpenTimer=0;
    }
    if(multiOpenIndex>=droppedBalls.length&&multiOpenTimer>0.6){
      // All opened — show results
      phase='idle';busy=false;
      showTenResults();
    }
  }

  // ── Single: dropping ──
  if(phase==='dropping'){
    if(capsuleBall&&capsuleBall.onFloor){phase='autoOpenWait';multiAutoTimer=0;}
  }

  // ── Single: auto-open ──
  if(phase==='autoOpenWait'){
    multiAutoTimer+=DT;
    if(multiAutoTimer>0.5){
      triggerOpenBall(capsuleBall);
      phase='singleRevealing';revealAlpha=0;openProgress=0;
      // Respawn
      const c=BALL_COLORS[Math.floor(Math.random()*BALL_COLORS.length)];
      const nb=createBall(DOME_CX+(Math.random()-.5)*60,DOME_CY-60,c);
      balls.push(nb);
      showSingleResult();
    }
  }

  if(phase==='singleRevealing'){
    revealAlpha=Math.min(1,revealAlpha+0.04);
    // Hold for a bit then go idle
    openProgress+=DT;
    if(openProgress>2){phase='idle';busy=false;}
  }

  // Physics
  physicsTick(DT,phase!=='tumbling');

  // Particles
  particles=particles.filter(p=>{p.x+=p.vx*DT;p.y+=p.vy*DT;p.vy+=200*DT;p.life-=1.5*DT;return p.life>0;});
  sparkles=sparkles.filter(p=>{p.x+=p.vx*DT;p.y+=p.vy*DT;p.life-=DT*1.2;p.vx*=.96;p.vy*=.96;return p.life>0;});
  shellPieces.forEach(p=>{p.x+=p.vx*DT;p.y+=p.vy*DT;p.vy+=300*DT;p.rot+=p.vrot*DT*10;p.alpha=Math.max(0,p.alpha-0.8*DT);});
  shakeX*=.88;shakeY*=.88;flashAlpha*=.9;

  // ═══════════ DRAW ═══════════
  ctx.save();ctx.translate(shakeX,shakeY);
  ctx.clearRect(-10,-10,W+20,H+20);

  const bgG=ctx.createRadialGradient(W/2,H*.35,0,W/2,H*.35,H*.75);
  bgG.addColorStop(0,'#1a1a3e');bgG.addColorStop(1,'#0a0a1a');ctx.fillStyle=bgG;ctx.fillRect(0,0,W,H);

  ctx.fillStyle='rgba(255,255,255,.02)';ctx.fillRect(0,FLOOR_Y,W,H-FLOOR_Y);
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(30,FLOOR_Y);ctx.lineTo(W-30,FLOOR_Y);ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(W/2,BODY_B+16,148,14,0,0,Math.PI*2);ctx.fill();

  // Body
  const bodyG=ctx.createLinearGradient(BODY_L,0,BODY_RX,0);
  bodyG.addColorStop(0,'#1a1a38');bodyG.addColorStop(.15,'#24244a');bodyG.addColorStop(.5,'#2a2a52');bodyG.addColorStop(.85,'#24244a');bodyG.addColorStop(1,'#1a1a38');
  ctx.fillStyle=bodyG;rr(ctx,BODY_L,BODY_T,BODY_RX-BODY_L,BODY_B-BODY_T,6);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=2;rr(ctx,BODY_L,BODY_T,BODY_RX-BODY_L,BODY_B-BODY_T,6);ctx.stroke();
  ctx.fillStyle=drawType==='golden'?'rgba(245,200,80,.6)':'rgba(180,180,220,.4)';
  ctx.font='bold 11px sans-serif';ctx.textAlign='center';
  ctx.fillText(drawType==='golden'?'★ GOLDEN GACHA ★':'✦ GACHA ✦',W/2,BODY_T+28);

  // Progress (multi)
  if(multiMode&&busy){
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.font='bold 14px sans-serif';
    const landed=droppedBalls.filter(b=>b.onFloor||b.opened).length;
    ctx.fillText(`${landed} / ${multiCount}`,W/2,BODY_T+50);
  }

  // Glass dome
  ctx.save();ctx.beginPath();ctx.arc(DOME_CX,DOME_CY,DOME_R,0,Math.PI*2);ctx.clip();
  for(const b of balls){if(b.escaped||b.opened)continue;drawCapsule(ctx,b.x,b.y,b.r,b.color);}
  ctx.restore();
  ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(DOME_CX,DOME_CY,DOME_R,0,Math.PI*2);ctx.stroke();
  const glG=ctx.createRadialGradient(DOME_CX-30,DOME_CY-50,10,DOME_CX,DOME_CY,DOME_R);
  glG.addColorStop(0,'rgba(200,220,255,.05)');glG.addColorStop(.5,'rgba(150,180,220,.015)');glG.addColorStop(1,'rgba(100,130,180,.04)');
  ctx.fillStyle=glG;ctx.beginPath();ctx.arc(DOME_CX,DOME_CY,DOME_R,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.globalAlpha=.13;ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(DOME_CX-55,DOME_CY-15,16,72,-.2,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.save();ctx.globalAlpha=.07;ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(DOME_CX+45,DOME_CY-55,10,22,.3,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.save();ctx.globalAlpha=.08;ctx.strokeStyle='#aaccff';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(DOME_CX,DOME_CY,DOME_R-2,.75*Math.PI,.25*Math.PI);ctx.stroke();ctx.restore();
  if(gateOpen){ctx.fillStyle='rgba(255,200,50,.2)';ctx.fillRect(HOLE_CX-HOLE_HALF_W,HOLE_Y-4,HOLE_HALF_W*2,8);}

  // Chute (wider during multi)
  const cw=multiMode&&multiCount>1?40:28;
  ctx.fillStyle='#12122a';ctx.beginPath();ctx.moveTo(W/2-cw,CHUTE_TOP);ctx.lineTo(W/2-cw+4,CHUTE_BOT);ctx.quadraticCurveTo(W/2,CHUTE_BOT+12,W/2+cw-4,CHUTE_BOT);ctx.lineTo(W/2+cw,CHUTE_TOP);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1.5;ctx.stroke();

  // Dial
  const DY=365;ctx.save();ctx.translate(W/2,DY);ctx.rotate(dialVisualAngle);
  const dG=ctx.createRadialGradient(-4,-4,0,0,0,32);dG.addColorStop(0,'#888');dG.addColorStop(.6,'#555');dG.addColorStop(1,'#333');
  ctx.fillStyle=dG;ctx.beginPath();ctx.arc(0,0,32,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#777';ctx.beginPath();ctx.arc(0,-23,8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#999';ctx.beginPath();ctx.arc(-1,-22,3,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-9,0);ctx.lineTo(9,0);ctx.stroke();ctx.beginPath();ctx.moveTo(0,-9);ctx.lineTo(0,9);ctx.stroke();
  ctx.restore();
  ctx.fillStyle='#1a1a30';rr(ctx,BODY_RX-38,DY-5,28,10,3);ctx.fill();
  ctx.fillStyle='#18183a';rr(ctx,BODY_L+18,BODY_B,28,22,3);ctx.fill();rr(ctx,BODY_RX-46,BODY_B,28,22,3);ctx.fill();

  // Escaped balls (chute + floor)
  for(const b of balls){
    if(!b.escaped||b.opened)continue;
    drawCapsule(ctx,b.x,b.y,b.r,b.color);
  }

  // Shell pieces
  shellPieces.forEach(p=>{if(p.alpha<=0)return;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.beginPath();ctx.moveTo(-p.r*.5,-p.r*.8);ctx.lineTo(p.r*.6,-p.r*.4);ctx.lineTo(p.r*.3,p.r*.7);ctx.lineTo(-p.r*.7,p.r*.4);ctx.closePath();ctx.fill();ctx.restore();});

  // Single reveal
  if(phase==='singleRevealing'&&capsuleBall){
    const info=RARITIES[capsuleRarity];ctx.save();ctx.globalAlpha=revealAlpha;
    const rx=capsuleBall.x,ry=capsuleBall.y,gr=65+Math.sin(time*2)*12;
    const gl=ctx.createRadialGradient(rx,ry-8,0,rx,ry-8,gr);gl.addColorStop(0,info.glow);gl.addColorStop(1,'transparent');
    ctx.fillStyle=gl;ctx.fillRect(rx-gr,ry-8-gr,gr*2,gr*2);
    const[emoji,name]=capsuleItem.split(' ');
    ctx.font='48px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(emoji,rx,ry-8);
    ctx.font='bold 16px sans-serif';ctx.fillStyle=info.color;ctx.fillText(name,rx,ry+38);
    ctx.font='11px sans-serif';ctx.fillStyle=info.color+'bb';ctx.fillText(info.label+' '+info.cn,rx,ry+58);
    ctx.restore();
  }

  // Multi: show rarity sparkle at each opened ball position
  if(multiMode&&(phase==='multiOpening'||phase==='idle')){
    for(let i=0;i<multiOpenIndex&&i<droppedBalls.length;i++){
      const ball=droppedBalls[i];if(!ball)continue;
      const res=multiResults[i];if(!res)continue;
      const info=RARITIES[res.rarity];
      ctx.save();ctx.globalAlpha=Math.min(1,(time-0)*2)*.8;
      const[emoji]=res.item.split(' ');
      ctx.font='22px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(emoji,ball.x,ball.y-4);
      ctx.restore();
    }
  }

  // Particles/sparkles/flash
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle='rgba(200,200,255,.5)';ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  sparkles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();ctx.strokeStyle=p.color;ctx.lineWidth=1;const s=p.size*1.8*p.life;ctx.beginPath();ctx.moveTo(p.x-s,p.y);ctx.lineTo(p.x+s,p.y);ctx.stroke();ctx.beginPath();ctx.moveTo(p.x,p.y-s);ctx.lineTo(p.x,p.y+s);ctx.stroke();});
  ctx.globalAlpha=1;
  if(flashAlpha>.01){ctx.fillStyle=flashColor;ctx.globalAlpha=flashAlpha;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}

  ctx.restore();
  requestAnimationFrame(loop);
}

function showSingleResult(){
  const info=RARITIES[capsuleRarity];
  const[emoji,name]=capsuleItem.split(' ');
  const bar=document.getElementById('resultBar');
  bar.style.borderColor=info.color+'44';
  bar.innerHTML=`<span class="rarity-dot" style="background:${info.color}"></span><span style="font-size:24px">${emoji}</span><span><b style="color:${info.color}">${name}</b> · <span style="color:${info.color};font-size:12px">${info.label} ${info.cn}</span></span>`;
}

function showTenResults(){
  const grid=document.getElementById('tenGrid');grid.innerHTML='';
  const order={legendary:0,epic:1,rare:2,common:3};
  const sorted=[...multiResults].sort((a,b)=>order[a.rarity]-order[b.rarity]);
  sorted.forEach((r,i)=>{
    const info=RARITIES[r.rarity];const[emoji,name]=r.item.split(' ');
    const cell=document.createElement('div');cell.className=`ten-cell ${r.rarity}`;
    cell.innerHTML=`<span class="emoji">${emoji}</span><span class="name" style="color:${info.color}">${name}</span><span class="rarity-label" style="color:${info.color}">${info.cn}</span>`;
    grid.appendChild(cell);setTimeout(()=>cell.classList.add('show'),80+i*100);
  });
  document.getElementById('tenTitle').textContent=drawType==='golden'?'🌟 黄金10连抽结果':'🎉 10连抽结果';
  document.getElementById('tenResultOverlay').classList.add('show');
  document.getElementById('resultBar').innerHTML='✅ 10连抽完成！';
  document.getElementById('resultBar').style.borderColor='rgba(255,255,255,.15)';
}

// ─── DRAW HELPERS ───
function drawCapsule(ctx,x,y,r,topColor){
  if(y+r>FLOOR_Y-60){const sa=Math.max(0,1-(FLOOR_Y-y-r)/60)*.25;ctx.fillStyle=`rgba(0,0,0,${sa})`;ctx.beginPath();ctx.ellipse(x,FLOOR_Y+2,r*.7,3,0,0,Math.PI*2);ctx.fill();}
  ctx.save();ctx.translate(x,y);
  const cg=ctx.createRadialGradient(0,0,r*.5,0,0,r*2);cg.addColorStop(0,'rgba(200,180,255,.06)');cg.addColorStop(1,'transparent');ctx.fillStyle=cg;ctx.fillRect(-r*2,-r*2,r*4,r*4);
  const tc=topColor||'#c06080';const tg=ctx.createRadialGradient(-r*.25,-r*.3,0,0,0,r);tg.addColorStop(0,lighten(tc,30));tg.addColorStop(.6,tc);tg.addColorStop(1,darken(tc,25));ctx.fillStyle=tg;ctx.beginPath();ctx.arc(0,0,r,Math.PI,0);ctx.closePath();ctx.fill();
  const bg=ctx.createRadialGradient(-r*.2,r*.15,0,0,0,r);bg.addColorStop(0,'#f0f0f0');bg.addColorStop(.6,'#d8d8d8');bg.addColorStop(1,'#aaa');ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-r,0);ctx.lineTo(r,0);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.ellipse(-r*.28,-r*.35,r*.3,r*.17,-.4,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,-r*.08,r*.28,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.22)';ctx.font=`bold ${r*.45}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('?',0,-r*.08);
  ctx.restore();
}
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}
function lighten(hex,amt){const m=hex.match(/^#?([\da-f]{2})([\da-f]{2})([\da-f]{2})$/i);if(!m)return hex;return`rgb(${Math.min(255,parseInt(m[1],16)+amt)},${Math.min(255,parseInt(m[2],16)+amt)},${Math.min(255,parseInt(m[3],16)+amt)})`;}
function darken(hex,amt){const m=hex.match(/^#?([\da-f]{2})([\da-f]{2})([\da-f]{2})$/i);if(!m)return hex;return`rgb(${Math.max(0,parseInt(m[1],16)-amt)},${Math.max(0,parseInt(m[2],16)-amt)},${Math.max(0,parseInt(m[3],16)-amt)})`;}

loop();
</script>
